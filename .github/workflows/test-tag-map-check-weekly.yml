name: "Weekly: Test Tag Map Check"

# Full-tree health check for test-tag-paths-map.json: flags Positron dirs with
# no map entry, and map entries that no longer point at any real file (renamed
# or deleted elsewhere without updating the map).
#
# Not run per-PR on purpose: both checks depend on the WHOLE tree's current
# state, not just what one PR touched, so a per-PR gate would fail unrelated
# PRs over drift they didn't cause. A weekly cadence is enough since neither
# problem gets more urgent by sitting a few more days.
#
# On drift, auto-fix opens (or updates) a PR that removes stale entries only --
# that's deterministic and safe, and nothing but this tree-wide sweep catches
# it (the PR that deletes a dir never touches the now-stale map key). Missing
# dirs and invalid tags are surfaced in the summary but NOT auto-fixed: a
# missing dir's tag needs human judgment (handled at PR-review time, where the
# per-PR unmapped-dir warning already prompts the author), and an invalid tag
# is a real error in the PR that introduced it. Nothing here merges on its own.

on:
  schedule:
    - cron: "0 12 * * 1" # Mondays, 12:00 UTC (6am CST -- shifts to 7am during CDT, cron is fixed UTC)
  workflow_dispatch:
    inputs:
      dryrun:
        description: 'Dry run: detect drift and compute fixes, but skip commit/push/PR/Slack.'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  check-map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check test tag map coverage and staleness
        run: |
          # `|| true`: --json's own exit code reflects drift, which would abort
          # this script (under -e) before the summary gets written. The real
          # pass/fail check runs explicitly as the step's last command instead.
          bash scripts/check-test-tag-map.sh --json > drift.json || true
          bash scripts/tag-map-drift-summary.sh drift.json >> "$GITHUB_STEP_SUMMARY"
          jq -e '.missing == [] and .stale == [] and .invalid_tags == []' drift.json >/dev/null

  auto-fix:
    name: 'Auto-fix map drift'
    runs-on: ubuntu-latest
    needs: [check-map]
    if: always() && needs.check-map.result == 'failure'
    permissions:
      contents: write
      pull-requests: write
    outputs:
      # pr_url: a link worth showing regardless of whether this run changed
      # anything (falls back to an untouched pre-existing PR). pr_updated:
      # true only when create-pr actually ran this run -- Slack uses this to
      # avoid claiming "auto-fix opened a PR" when it just found an old one.
      pr_url: ${{ steps.create-pr.outputs.pr_url || steps.detect.outputs.pr_url }}
      pr_updated: ${{ steps.create-pr.outputs.pr_url != '' }}
      # Surfaced to Slack so a run that only removed stale entries still nudges
      # about missing dirs that need manual tags.
      missing_count: ${{ steps.drift.outputs.missing_count }}
    steps:
      - name: Generate POSITRON_BOT token
        id: bot-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.POSITRON_BOT_APP_ID }}
          private-key: ${{ secrets.POSITRON_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ steps.bot-token.outputs.token }}

      - name: Configure git identity
        run: |
          git config user.name "positron-bot[bot]"
          git config user.email "positron-bot[bot]@users.noreply.github.com"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Detect existing auto-fix PR
        id: detect
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
        run: |
          PR_INFO=$(gh pr list --base main --state open \
            --json number,url,headRefName,reviewDecision \
            --jq '[.[] | select(.headRefName | startswith("automated/test-tag-map-drift"))] | first // empty')
          if [ -z "$PR_INFO" ]; then
            echo "No existing auto-fix PR found; a new one will be created if needed."
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PR_NUMBER=$(echo "$PR_INFO" | jq -r .number)
          PR_URL=$(echo "$PR_INFO" | jq -r .url)
          PR_BRANCH=$(echo "$PR_INFO" | jq -r .headRefName)
          PR_REVIEW=$(echo "$PR_INFO" | jq -r '.reviewDecision // ""')
          echo "Found existing PR #$PR_NUMBER on branch $PR_BRANCH (review: ${PR_REVIEW:-none})"

          # Same review-safety check as the bootstrap-extensions auto-update PR
          # (.github/workflows/extensions-check-nightly.yml): any human signal
          # (review comment, issue comment, non-bot commit, or a review
          # verdict) means someone may have hand-edited the PR, so add commits
          # on top instead of force-pushing over their work.
          BOT_FILTER='[.[] | select((.user.type // "User") != "Bot")] | length'
          REVIEW_COMMENTS=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/comments" --jq "$BOT_FILTER")
          ISSUE_COMMENTS=$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" --jq "$BOT_FILTER")
          NON_BOT_COMMITS=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/commits" \
            --jq '[.[] | select((.author.type // "User") != "Bot")] | length')
          # Only a real review verdict counts. REVIEW_REQUIRED just means branch
          # protection wants a review -- every PR reports it, so treating it as a
          # human signal would force additive mode always and reset would never
          # fire.
          REVIEWED=false
          case "$PR_REVIEW" in APPROVED|CHANGES_REQUESTED) REVIEWED=true ;; esac
          if [ "$REVIEW_COMMENTS" -gt 0 ] || [ "$ISSUE_COMMENTS" -gt 0 ] || [ "$NON_BOT_COMMITS" -gt 0 ] || [ "$REVIEWED" = true ]; then
            MODE=additive
          else
            MODE=reset
          fi
          echo "Reuse mode: $MODE (review comments: $REVIEW_COMMENTS, issue comments: $ISSUE_COMMENTS, non-bot commits: $NON_BOT_COMMITS, review decision: ${PR_REVIEW:-none})"
          {
            echo "exists=true"
            echo "pr_number=$PR_NUMBER"
            echo "pr_url=$PR_URL"
            echo "pr_branch=$PR_BRANCH"
            echo "mode=$MODE"
          } >> "$GITHUB_OUTPUT"

      - name: Check out existing branch
        if: steps.detect.outputs.exists == 'true'
        env:
          PR_BRANCH: ${{ steps.detect.outputs.pr_branch }}
          MODE: ${{ steps.detect.outputs.mode }}
        run: |
          git fetch origin "$PR_BRANCH" main
          git checkout "$PR_BRANCH"
          if [ "$MODE" = "reset" ]; then
            echo "Resetting $PR_BRANCH to origin/main; drift will be recomputed from scratch."
            git reset --hard origin/main
          else
            # Additive: keep the human commits, but merge current main so drift
            # reflects entries that went stale on main since this PR opened --
            # otherwise we'd recompute against a possibly-behind branch and miss
            # them.
            echo "Additive mode: merging origin/main to refresh drift while keeping human commits."
            if ! git merge --no-edit origin/main; then
              git merge --abort
              echo "::error::Cannot merge origin/main into $PR_BRANCH (conflict); resolve the PR branch by hand." >&2
              exit 1
            fi
          fi

      - name: Compute drift
        id: drift
        run: |
          bash scripts/check-test-tag-map.sh --json > drift.json || true
          jq '.stale' drift.json > stale.json
          echo "missing_count=$(jq '.missing | length' drift.json)" >> "$GITHUB_OUTPUT"

      - name: Apply fixes
        id: apply
        run: |
          RESULT=$(node scripts/apply-test-tag-map-fixes.mjs \
            --map .github/workflows/test-tag-paths-map.json \
            --stale stale.json)
          echo "$RESULT"
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        id: push
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          EXISTS: ${{ steps.detect.outputs.exists }}
          MODE: ${{ steps.detect.outputs.mode }}
          PR_BRANCH: ${{ steps.detect.outputs.pr_branch }}
          DRYRUN: ${{ inputs.dryrun }}
        run: |
          if [ "$EXISTS" = "true" ]; then
            BRANCH="$PR_BRANCH"
            git add .github/workflows/test-tag-paths-map.json
            if git diff --staged --quiet; then
              echo "No auto-fixable changes -- existing PR untouched (or nothing needed fixing)."
              exit 0
            fi
            if [ "$DRYRUN" = "true" ]; then
              echo "[dryrun] Would commit and $( [ "$MODE" = "reset" ] && echo "force-" )push to existing branch $BRANCH ($MODE)."
              git --no-pager diff --staged
              # Separate output from `branch`: `branch` gates whether
              # "Create or update pull request" runs, and must stay empty in
              # dry-run mode so that step never fires for real. `dryrun_branch`
              # is only for "Write summary" to report what would have happened.
              echo "dryrun_branch=$BRANCH" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            git commit -m "chore: auto-fix test tag map drift"
            if [ "$MODE" = "reset" ]; then
              git push --force-with-lease origin "$BRANCH"
            else
              git push origin "$BRANCH"
            fi
          else
            BRANCH="automated/test-tag-map-drift-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git add .github/workflows/test-tag-paths-map.json
            if git diff --staged --quiet; then
              echo "No auto-fixable changes -- skipping PR."
              exit 0
            fi
            if [ "$DRYRUN" = "true" ]; then
              echo "[dryrun] Would commit and push new branch $BRANCH."
              git --no-pager diff --staged
              echo "dryrun_branch=$BRANCH" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            git commit -m "chore: auto-fix test tag map drift"
            git push origin "$BRANCH"
          fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create or update pull request
        id: create-pr
        if: steps.push.outputs.branch != ''
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          BRANCH: ${{ steps.push.outputs.branch }}
          EXISTS: ${{ steps.detect.outputs.exists }}
          EXISTING_PR_NUMBER: ${{ steps.detect.outputs.pr_number }}
          EXISTING_PR_URL: ${{ steps.detect.outputs.pr_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RESULT: ${{ steps.apply.outputs.result }}
          MISSING_COUNT: ${{ steps.drift.outputs.missing_count }}
        run: |
          REMOVED=$(echo "$RESULT" | jq -r '.removed | map("- `" + . + "`") | join("\n")')
          # "Still needs attention" only when there are missing dirs; built with
          # printf so the embedded newlines don't fight the YAML block indent.
          ATTENTION=""
          if [ "${MISSING_COUNT:-0}" -gt 0 ]; then
            [ "$MISSING_COUNT" = "1" ] && ATTN_ITEM="1 directory needs tags assigned" || ATTN_ITEM="${MISSING_COUNT} directories need tags assigned"
            ATTENTION=$(printf '\n\n**Still needs attention**\n\n- **%s** (see the [weekly check summary](%s))' "$ATTN_ITEM" "$RUN_URL")
          fi
          BODY=$(printf '**Removed**\n\n%s%s\n\n--\n_This PR is auto-managed by the weekly test tag map check; the body may be overwritten on subsequent runs._' "$REMOVED" "$ATTENTION")
          if [ "$EXISTS" = "true" ]; then
            gh pr edit "$EXISTING_PR_NUMBER" --body "$BODY" >/dev/null
            echo "Updated existing PR: $EXISTING_PR_URL"
            echo "pr_url=$EXISTING_PR_URL" >> "$GITHUB_OUTPUT"
          else
            PR_URL=$(gh pr create --base main --head "$BRANCH" \
              --title "chore: auto-fix test tag map drift" \
              --body "$BODY")
            echo "Created new PR: $PR_URL"
            echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          fi

      - name: Write summary
        if: always()
        env:
          DRYRUN: ${{ inputs.dryrun }}
          EXISTS: ${{ steps.detect.outputs.exists }}
          DETECTED_PR_URL: ${{ steps.detect.outputs.pr_url }}
          MODE: ${{ steps.detect.outputs.mode }}
          APPLY_RESULT: ${{ steps.apply.outputs.result }}
          MISSING_COUNT: ${{ steps.drift.outputs.missing_count }}
          DRYRUN_PUSH_BRANCH: ${{ steps.push.outputs.dryrun_branch }}
          FINAL_PR_URL: ${{ steps.create-pr.outputs.pr_url }}
        run: |
          {
            echo "### Auto-fix Map Drift"
            echo ""
            if [ "$DRYRUN" = "true" ]; then
              echo ":test_tube: **Dry run** -- commit, push, PR, and Slack were all skipped."
              echo ""
            fi
            if [ "$EXISTS" = "true" ]; then
              echo "Reusing existing PR: $DETECTED_PR_URL (mode: \`$MODE\`)"
              echo ""
            fi
            # Only what this job changed -- the full drift breakdown is the
            # check-map job's summary on the same run page, not repeated here.
            if [ -n "$APPLY_RESULT" ]; then
              REMOVED_N=$(echo "$APPLY_RESULT" | jq -r '.removed | length')
              [ "$REMOVED_N" = "1" ] && REMOVED_NOUN=entry || REMOVED_NOUN=entries
              echo "#### Result"
              echo ""
              echo "- Removed: $REMOVED_N stale $REMOVED_NOUN"
              if [ "${MISSING_COUNT:-0}" -gt 0 ]; then
                [ "$MISSING_COUNT" = "1" ] && MISSING_VERB="dir needs" || MISSING_VERB="dirs need"
                echo "- Missing: $MISSING_COUNT $MISSING_VERB tags manually fixed"
              fi
              echo ""
            fi
            if [ -n "$FINAL_PR_URL" ]; then
              echo ":white_check_mark: [Opened/updated PR]($FINAL_PR_URL)"
            elif [ -n "$DRYRUN_PUSH_BRANCH" ]; then
              echo ":test_tube: Would push to \`$DRYRUN_PUSH_BRANCH\` and open a PR against \`main\` (dry run)."
            elif [ "$EXISTS" = "true" ] && [ -n "$DETECTED_PR_URL" ]; then
              echo "No new changes needed -- existing PR left as-is."
            else
              echo "No stale entries to remove (any remaining drift -- missing dirs, invalid tags -- needs a manual fix)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  slack-notification:
    name: 'Send Slack notification'
    runs-on: ubuntu-latest
    needs: [check-map, auto-fix]
    # A single-job-worth-of-signal notification doesn't need
    # midleman/slack-workflow-status's multi-job summary -- a plain custom
    # message reads better here.
    if: always() && needs.check-map.result == 'failure' && inputs.dryrun != true
    steps:
      - name: Notify Slack
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN_TEST_STATUS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR_URL: ${{ needs.auto-fix.outputs.pr_url }}
          PR_UPDATED: ${{ needs.auto-fix.outputs.pr_updated }}
          MISSING_COUNT: ${{ needs.auto-fix.outputs.missing_count }}
        run: |
          # A header line with the run link (its summary is the one place that
          # always lists missing dirs), then a bullet per item.
          HEADER="⚠️ *Test tag map has drifted* · <${RUN_URL}|details>"
          # Three distinct states: a freshly opened/updated PR reads differently
          # from an old PR still open but untouched this run (PR_UPDATED false) --
          # claiming "opened" for the latter would misreport what happened.
          if [ "$PR_UPDATED" = "true" ]; then
            PR_NUM="${PR_URL##*/}"
            ACTION="<${PR_URL}|PR #${PR_NUM}> removes stale entries"
          elif [ -n "$PR_URL" ]; then
            PR_NUM="${PR_URL##*/}"
            ACTION="fix already open in <${PR_URL}|PR #${PR_NUM}>"
          else
            ACTION="needs manual fix"
          fi
          TEXT="${HEADER}"$'\n'"• ${ACTION}"
          # Missing dirs are surfaced but never auto-fixed, so add a bullet
          # whenever there are any -- even a run that opened a removal PR.
          if [ "${MISSING_COUNT:-0}" -gt 0 ]; then
            [ "$MISSING_COUNT" = "1" ] && MISSING_ITEM="1 directory needs tags" || MISSING_ITEM="${MISSING_COUNT} directories need tags"
            TEXT="${TEXT}"$'\n'"• ${MISSING_ITEM}"
          fi
          PAYLOAD=$(jq -n \
            --arg channel "D07KSCRU0SZ" \
            --arg text "$TEXT" \
            '{channel: $channel, text: $text}')
          RESPONSE=$(curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          # curl -s only reflects the HTTP status; Slack returns 200 with
          # {"ok": false, ...} on a bad token/channel/rate limit, which would
          # otherwise silently drop the notification with a green job.
          if ! echo "$RESPONSE" | jq -e '.ok == true' >/dev/null; then
            echo "Slack notification failed: $(echo "$RESPONSE" | jq -r '.error // "unknown error"')" >&2
            exit 1
          fi
