name: "Weekly: Audit Test Tag Map"
on:
  schedule:
    - cron: "0 12 * * 1" # Mondays, 12:00 UTC (6am CST -- shifts to 7am during CDT, cron is fixed UTC)
  workflow_dispatch:
    inputs:
      dryrun:
        description: 'Dry run: detect drift and compute fixes, but skip commit/push/PR/Slack.'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  audit-tag-map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check test tag map coverage and staleness
        run: |
          # `|| true`: --json's own exit code reflects drift, which would abort
          # this script (under -e) before the summary gets written. The real
          # pass/fail check runs explicitly as the step's last command instead.
          bash scripts/check-test-tag-map.sh --json > drift.json || true
          bash scripts/tag-map-drift-summary.sh drift.json >> "$GITHUB_STEP_SUMMARY"
          jq -e '.missing == [] and .stale == [] and .invalid_tags == []' drift.json >/dev/null

  fix-tag-map-drift:
    runs-on: ubuntu-latest
    needs: [audit-tag-map]
    if: always() && needs.audit-tag-map.result == 'failure'
    permissions:
      contents: write
      pull-requests: write
    outputs:
      pr_url: ${{ steps.sync.outputs.pr_url }}
      # created | updated | reset-cleared | unchanged | none -- drives Slack wording.
      pr_action: ${{ steps.sync.outputs.pr_action }}
      # Surfaced to Slack so a run that only removed stale entries still nudges
      # about missing dirs that need manual tags.
      missing_count: ${{ steps.drift.outputs.missing_count }}
    steps:
      # Local composite actions (used below) only resolve once the repo is on
      # disk, so check out first. detect-managed-pr re-checks-out with the bot
      # token to set up push credentials.
      - uses: actions/checkout@v7
      - name: Detect managed PR
        id: detect
        uses: ./.github/actions/detect-managed-pr
        with:
          branch-prefix: automated/test-tag-map-drift
          app-id: ${{ vars.POSITRON_BOT_APP_ID }}
          private-key: ${{ secrets.POSITRON_BOT_PRIVATE_KEY }}

      # Pin Node for scripts/apply-test-tag-map-fixes.mjs rather than relying on
      # whatever ships with ubuntu-latest.
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Refresh branch for drift recompute
        if: steps.detect.outputs.exists == 'true'
        env:
          MODE: ${{ steps.detect.outputs.mode }}
        run: |
          if [ "$MODE" = "reset" ]; then
            echo "Resetting to origin/main; drift will be recomputed from scratch."
            git reset --hard origin/main
          else
            # Additive: keep the human commits, but merge current main so drift
            # reflects entries that went stale on main since this PR opened.
            echo "Additive mode: merging origin/main to refresh drift while keeping human commits."
            if ! git merge --no-edit origin/main; then
              git merge --abort
              echo "::error::Cannot merge origin/main into the PR branch (conflict); resolve by hand." >&2
              exit 1
            fi
          fi

      - name: Compute drift
        id: drift
        run: |
          bash scripts/check-test-tag-map.sh --json > drift.json || true
          jq '.stale' drift.json > stale.json
          echo "missing_count=$(jq '.missing | length' drift.json)" >> "$GITHUB_OUTPUT"

      - name: Apply fixes
        id: apply
        run: |
          RESULT=$(node scripts/apply-test-tag-map-fixes.mjs \
            --map .github/workflows/test-tag-paths-map.json \
            --stale stale.json)
          echo "$RESULT"
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"
          git add .github/workflows/test-tag-paths-map.json

      - name: Build PR body
        id: content
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RESULT: ${{ steps.apply.outputs.result }}
          MISSING_COUNT: ${{ steps.drift.outputs.missing_count }}
        run: |
          REMOVED=$(echo "$RESULT" | jq -r '.removed | map("- `" + . + "`") | join("\n")')
          ATTENTION=""
          if [ "${MISSING_COUNT:-0}" -gt 0 ]; then
            [ "$MISSING_COUNT" = "1" ] && ATTN_ITEM="1 directory needs tags assigned" || ATTN_ITEM="${MISSING_COUNT} directories need tags assigned"
            ATTENTION=$(printf '\n\n**:warning: Still needs attention**\n\n- %s' "$ATTN_ITEM")
          fi
          BODY=$(printf '### Summary\n\nThis PR removes stale entries found by the [weekly test tag audit](%s).\n\n**:white_check_mark: Removed**\n\n%s%s\n\n--\n_This PR is auto-managed by the weekly test tag map check; the body may be overwritten on subsequent runs._' "$RUN_URL" "$REMOVED" "$ATTENTION")
          # Randomized delimiter so a body line can't accidentally match it and
          # truncate the multiline output.
          DELIM="PR_BODY_EOF_$(openssl rand -hex 8)"
          {
            echo "body<<$DELIM"
            printf '%s\n' "$BODY"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Commit and sync PR
        id: sync
        uses: ./.github/actions/commit-and-sync-pr
        with:
          github-token: ${{ steps.detect.outputs.github-token }}
          exists: ${{ steps.detect.outputs.exists }}
          mode: ${{ steps.detect.outputs.mode }}
          pr_number: ${{ steps.detect.outputs.pr_number }}
          pr_url: ${{ steps.detect.outputs.pr_url }}
          pr_branch: ${{ steps.detect.outputs.pr_branch }}
          branch-prefix: automated/test-tag-map-drift
          commit-message: 'chore: auto-fix test tag map drift'
          title: 'chore: auto-fix test tag map drift'
          body: ${{ steps.content.outputs.body }}
          dryrun: ${{ inputs.dryrun }}
          clear-stale-branch-on-empty-reset: 'true'

      - name: Write summary
        if: always()
        env:
          DRYRUN: ${{ inputs.dryrun }}
          EXISTS: ${{ steps.detect.outputs.exists }}
          DETECTED_PR_URL: ${{ steps.detect.outputs.pr_url }}
          MODE: ${{ steps.detect.outputs.mode }}
          APPLY_RESULT: ${{ steps.apply.outputs.result }}
          MISSING_COUNT: ${{ steps.drift.outputs.missing_count }}
          PR_ACTION: ${{ steps.sync.outputs.pr_action }}
          PR_URL: ${{ steps.sync.outputs.pr_url }}
        run: |
          {
            echo "## Report Tag Map Drift"
            echo ""
            if [ "$DRYRUN" = "true" ]; then
              echo "**Dry run:** no commit, push, PR, or Slack notification will be created."
              echo ""
            fi
            if [ "$EXISTS" = "true" ]; then
              echo "Reusing existing PR: $DETECTED_PR_URL (mode: \`$MODE\`)"
              echo ""
            fi
            # Only what this job changed -- the full drift breakdown is the
            # audit-tag-map job's summary on the same run page, not repeated here.
            if [ -n "$APPLY_RESULT" ]; then
              REMOVED_N=$(echo "$APPLY_RESULT" | jq -r '.removed | length')
              [ "$REMOVED_N" = "1" ] && REMOVED_NOUN=entry || REMOVED_NOUN=entries
              echo "### Result"
              echo ""
              echo "- Removed: **$REMOVED_N stale $REMOVED_NOUN**"
              if [ "${MISSING_COUNT:-0}" -gt 0 ]; then
                [ "$MISSING_COUNT" = "1" ] && MISSING_NOUN=dir || MISSING_NOUN=dirs
                [ "$MISSING_COUNT" = "1" ] && MISSING_VERB=needs || MISSING_VERB=need
                echo "- Missing: **$MISSING_COUNT $MISSING_NOUN** $MISSING_VERB tags manually fixed"
              fi
              echo ""
            fi
            case "$PR_ACTION" in
              created)
                # pr_url is empty in dry-run (no PR actually opened).
                if [ -n "$PR_URL" ]; then echo "**PR:** [opened]($PR_URL)"; else echo "**Next action:** would open a PR against \`main\`."; fi ;;
              updated)
                if [ "$DRYRUN" = "true" ]; then echo "**Next action:** would update the [existing PR]($PR_URL)."; else echo "**PR:** [updated]($PR_URL)"; fi ;;
              reset-cleared)
                if [ "$DRYRUN" = "true" ]; then echo "**Next action:** would reset the [existing PR]($PR_URL) branch to \`main\` (no stale entries remain)."; else echo "**PR:** reset [existing PR]($PR_URL) branch to \`main\` -- no stale entries remain."; fi ;;
              unchanged)     echo "**Next action:** none -- existing PR left as-is." ;;
              *)             echo "**Next action:** none -- no stale entries to remove (any remaining drift, such as missing dirs or invalid tags, needs a manual fix)." ;;
            esac
          } >> "$GITHUB_STEP_SUMMARY"

  slack-notify:
    runs-on: ubuntu-latest
    needs: [audit-tag-map, fix-tag-map-drift]
    if: always() && needs.audit-tag-map.result == 'failure' && inputs.dryrun != true
    steps:
      - name: Notify Slack
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN_TEST_STATUS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR_URL: ${{ needs.fix-tag-map-drift.outputs.pr_url }}
          PR_ACTION: ${{ needs.fix-tag-map-drift.outputs.pr_action }}
          MISSING_COUNT: ${{ needs.fix-tag-map-drift.outputs.missing_count }}
        run: |
          # A header line with the run link (its summary is the one place that
          # always lists missing dirs), then a bullet per item.
          HEADER="⚠️ *Test tag map has drifted* · <${RUN_URL}|details>"
          # PR state reads differently per pr_action -- a freshly opened/updated
          # PR vs an old one still open but untouched this run -- so the wording
          # branches on pr_action rather than claiming "opened" for all.
          case "$PR_ACTION" in
            created|updated)
              PR_NUM="${PR_URL##*/}"
              ACTION="<${PR_URL}|PR #${PR_NUM}> removes stale entries" ;;
            reset-cleared)
              PR_NUM="${PR_URL##*/}"
              ACTION="reset <${PR_URL}|PR #${PR_NUM}> to main (no stale entries remain)" ;;
            unchanged)
              PR_NUM="${PR_URL##*/}"
              ACTION="fix already open in <${PR_URL}|PR #${PR_NUM}>" ;;
            *)
              ACTION="needs manual fix" ;;
          esac
          TEXT="${HEADER}"$'\n'"• ${ACTION}"
          # Missing dirs are surfaced but never auto-fixed, so add a bullet
          # whenever there are any -- even a run that opened a removal PR.
          if [ "${MISSING_COUNT:-0}" -gt 0 ]; then
            [ "$MISSING_COUNT" = "1" ] && MISSING_ITEM="1 directory needs tags" || MISSING_ITEM="${MISSING_COUNT} directories need tags"
            TEXT="${TEXT}"$'\n'"• ${MISSING_ITEM}"
          fi
          PAYLOAD=$(jq -n \
            --arg channel "#positron-dev" \
            --arg text "$TEXT" \
            '{channel: $channel, text: $text}')
          RESPONSE=$(curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          # curl -s only reflects the HTTP status; Slack returns 200 with
          # {"ok": false, ...} on a bad token/channel/rate limit, which would
          # otherwise silently drop the notification with a green job.
          if ! echo "$RESPONSE" | jq -e '.ok == true' >/dev/null; then
            echo "Slack notification failed: $(echo "$RESPONSE" | jq -r '.error // "unknown error"')" >&2
            exit 1
          fi
