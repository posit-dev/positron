name: "Nightly: Release Screenshots"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1-5'  # 09:00 UTC, Mon-Fri

concurrency:
  group: release-screenshots-nightly
  cancel-in-progress: true

jobs:
  run:
    uses: ./.github/workflows/release-screenshots.yml
    with:
      mode: nightly
      version: latest-prerelease
    secrets: inherit
