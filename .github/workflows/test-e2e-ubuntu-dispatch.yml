name: "Test: E2E Ubuntu (Manual Dispatch)"
run-name: "E2E Ubuntu: ${{ inputs.ref }} (${{ inputs.project }})"

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to test"
        required: true
        type: string
      project:
        description: "Playwright project to run"
        required: false
        default: "e2e-electron"
        type: choice
        options:
          - e2e-electron
          - e2e-chromium
      shards:
        description: "Number of shards"
        required: false
        default: 4
        type: number
      grep:
        description: "Test filter (grep pattern or tags)"
        required: false
        default: ""
        type: string
      grep_invert:
        description: "Exclude tests matching this pattern"
        required: false
        default: ""
        type: string
      workers:
        description: "Number of parallel workers per shard"
        required: false
        default: 2
        type: number
      enable_diagnostic_logging:
        description: "Enable diagnostic logging"
        required: false
        default: false
        type: boolean
      max_failures:
        description: "Max test failures before aborting (default: 6 for 4 shards)"
        required: false
        default: 6
        type: number

jobs:
  build:
    name: build
    uses: ./.github/workflows/test-e2e-ubuntu-build.yml
    secrets: inherit
    with:
      commit: ${{ inputs.ref }}
      skip_cache: true

  run:
    name: run
    needs: [build]
    uses: ./.github/workflows/test-e2e-ubuntu-run.yml
    secrets: inherit
    with:
      commit: ${{ inputs.ref }}
      grep: ${{ inputs.grep }}
      grep_invert: ${{ inputs.grep_invert }}
      project: ${{ inputs.project }}
      workers: ${{ inputs.workers }}
      shards: ${{ inputs.shards }}
      matrix: ${{ inputs.shards == 1 && '{"shard":[1]}' || inputs.shards == 2 && '{"shard":[1,2]}' || inputs.shards == 3 && '{"shard":[1,2,3]}' || '{"shard":[1,2,3,4]}' }}
      display_name: ${{ inputs.project }}
      install_undetectable_interpreters: true
      install_license: ${{ inputs.project == 'e2e-chromium' }}
      allow_soft_fail: false
      upload_logs: true
      max_failures: ${{ inputs.max_failures }}
      enable_diagnostic_logging: ${{ inputs.enable_diagnostic_logging }}
