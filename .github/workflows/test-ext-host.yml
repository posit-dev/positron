name: "Test: Extension Host"

on:
  workflow_call:
    inputs:
      commit:
        description: "Commit SHA to test"
        required: false
        default: ""
        type: string
      pull_request:
        required: false
        type: boolean
  workflow_dispatch:
    inputs:
      pull_request:
        description: "Is this a pull request run?"
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read
  packages: read

jobs:
  ext-host-tests:
    name: ext-host
    runs-on: ubuntu-latest-4x
    timeout-minutes: 60
    # Run inside the shared CI image, which bakes in the system dependencies,
    # Node (matching .nvmrc), and R 4.5.2 + test-files deps that this
    # job used to install at runtime. See posit-dev/positron-ci-images.
    container:
      image: ghcr.io/posit-dev/positron-ubuntu24:24.15.0
      # --shm-size: Chromium/Electron exhausts the container's default 64MB
      # /dev/shm under load (e.g. the web integration tests), which can surface
      # as "Failed to fetch dynamically imported module". Size it up to match
      # what the bare runner provided (verified against the CI image).
      options: --user 0:0 --init --shm-size=2g
      credentials:
        username: ${{ secrets.POSITRON_GITHUB_RO_USER }}
        password: ${{ secrets.POSITRON_GITHUB_RO_PAT }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      POSITRON_BUILD_NUMBER: 0 # CI skips building releases
      _R_CHECK_FUTURE_FILE_TIMESTAMPS_: false # this check can be flaky in the R pkg tests
      _R_CHECK_CRAN_INCOMING_: false
      _R_CHECK_SYSTEM_CLOCK_: false
      HOME: /root
      DOCKER_CONFIG: /tmp/.docker
      R_LIBS_SITE: /usr/local/lib/R/site-library
      R_LIBS_USER: /usr/local/lib/R/site-library
      RETICULATE_PYTHON: /root/.venv/bin/python
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Checkout specific commit
        if: ${{ inputs.commit != '' }}
        run: |
          git checkout ${{ inputs.commit }}
          git submodule update --init --recursive

      - name: 📦 Restore caches
        id: restore-caches
        uses: ./.github/actions/restore-build-caches

      - name: Install node dependencies
        if: steps.restore-caches.outputs.cache-npm-core-hit != 'true' ||
            steps.restore-caches.outputs.cache-npm-extensions-volatile-hit != 'true' ||
            steps.restore-caches.outputs.cache-npm-extensions-stable-hit != 'true'
        uses: nick-fields/retry@v4
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          POSITRON_GITHUB_RO_PAT: ${{ github.token }}
          POSITRON_PARALLEL_INSTALL: '0'
          POSITRON_NPM_CONCURRENCY: '10'
          NPM_CONFIG_AUDIT: 'false'              # Skip security audit during install (speeds up install)
          NPM_CONFIG_FUND: 'false'               # Skip funding messages
          NPM_CONFIG_UPDATE_NOTIFIER: 'false'    # Skip update notifications
          NPM_CONFIG_DEVDIR: '.node-gyp-cache'   # Use workspace-relative path for node-gyp cache (Docker compatibility)
          DOCKER_CONFIG: /tmp/.docker            # Avoid Docker permission errors
          # Extension filter logic:
          #   volatile=hit, stable=miss  → filter=stable (install stable only)
          #   volatile=miss, stable=hit  → filter=volatile (install volatile only)
          #   both hit OR both miss      → filter='' (install all or skip via parent condition)
          POSITRON_EXTENSIONS_FILTER: ${{ (steps.restore-caches.outputs.cache-npm-extensions-volatile-hit == 'true' && steps.restore-caches.outputs.cache-npm-extensions-stable-hit != 'true' && 'stable') || (steps.restore-caches.outputs.cache-npm-extensions-volatile-hit != 'true' && steps.restore-caches.outputs.cache-npm-extensions-stable-hit == 'true' && 'volatile') || '' }}
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 5
          shell: bash
          command: |
            set -e  # Exit immediately if any command fails

            # Install node-gyp (required by some packages)
            npm i --global node-gyp

            # Run parallel npm install
            bash scripts/install-npm-parallel.sh

      - name: Download binaries (Ark, Kallichore)
        uses: ./.github/actions/download-binaries
        with:
          cache-hit: ${{ steps.restore-caches.outputs.cache-npm-extensions-volatile-hit == 'true' ||
                         steps.restore-caches.outputs.cache-npm-extensions-stable-hit == 'true' }}

      - name: Compile Positron and Download Electron
        run: npm exec -- npm-run-all --max-old-space-size=8192 -p compile "electron x64"

      # System deps are baked into the container image, so install browsers only.
      - name: Install Playwright browsers
        env:
          PLAYWRIGHT_BROWSERS_PATH: .playwright-browsers
        run: npx playwright install

      - name: Setup Xvfb
        uses: ./.github/actions/setup-xvfb


      # Downloads Builtin Extensions (needed for integration & e2e testing)
      - name: Prelaunch
        run: npm run prelaunch

      # Must run AFTER Prelaunch since preLaunch.ts runs `npm run electron`
      # which can re-extract the Electron binary and reset permissions
      - name: Set permissions on SUID sandbox helper
        run: |
          ELECTRON_ROOT=.build/electron
          sudo chown root $ELECTRON_ROOT/chrome-sandbox
          sudo chmod 4755 $ELECTRON_ROOT/chrome-sandbox
          stat $ELECTRON_ROOT/chrome-sandbox

      - name: Install Positron License
        uses: ./.github/actions/install-license
        with:
          github-token: ${{ secrets.POSITRON_GITHUB_RO_PAT }}
          license-key: ${{ secrets.POSITRON_DEV_LICENSE }}

      # R 4.5.2 and the test-files deps are baked into the container image. One
      # integration test ("Connections pane works for R") reads a DESCRIPTION
      # file from the repo root, so stage that from test-files.
      - name: Stage R DESCRIPTION file
        run: cp test/e2e/test-files/DESCRIPTION DESCRIPTION

      - name: Compile Integration Tests
        run: npm run --prefix test/integration/browser compile

      - name: 🧪 Run Extension Host Tests (Electron)
        id: electron-integration-tests
        env:
          PLAYWRIGHT_BROWSERS_PATH: .playwright-browsers
        run: |
          if [ "${{ inputs.pull_request }}" = "true" ]; then
            DISPLAY=:10 ./scripts/test-integration-pr.sh
          else
            DISPLAY=:10 ./scripts/test-integration.sh
          fi

      - name: 🧪 Run Extension Host Tests (Remote)
        if: ${{ job.status != 'cancelled' && (success() || failure()) }}
        id: electron-remote-integration-tests
        env:
          PLAYWRIGHT_BROWSERS_PATH: .playwright-browsers
        # Since the Electron 42 bump (upstream 1.124.0, #14673), Electron
        # intermittently segfaults (exit 139) at startup in the system
        # libfontconfig/libexpat on the ubuntu24 CI image, killing whichever
        # suite happens to be launching. Retry only on that exit code so real
        # test failures still fail fast.
        run: |
          for attempt in 1 2 3; do
            code=0
            DISPLAY=:10 ./scripts/test-remote-integration.sh || code=$?
            if [ "$code" -ne 139 ]; then
              exit "$code"
            fi
            echo "Electron segfaulted at startup (exit 139) on attempt $attempt/3"
          done
          exit 139

      - name: 🧪 Run Extension Host Tests (Chromium)
        if: ${{ job.status != 'cancelled' && (success() || failure()) }}
        id: browser-integration-tests
        env:
          PLAYWRIGHT_BROWSERS_PATH: .playwright-browsers
        run: DISPLAY=:10 ./scripts/test-web-integration.sh --browser chromium
