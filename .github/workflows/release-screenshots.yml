name: "Release Screenshots"

# Cron triggers nightly mode automatically (compare-only). Manual dispatch
# can pick publish mode to open a PR in posit-dev/positron-website with
# changed images.

run-name: "${{ inputs.mode == 'publish' && 'Publish' || 'Nightly' }}: Release Screenshots"

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode"
        type: choice
        options:
          - nightly
          - publish
        default: nightly
      version:
        description: "Positron version: a tag, 'latest-prerelease', 'latest-release', or 'auto' (default; latest-prerelease for nightly, latest-release for publish)."
        type: string
        default: auto
      open_pr:
        description: "Publish mode: open a PR if there are changes. No-op for nightly."
        type: boolean
        default: true
      slack_notify:
        description: "Notify #positron-test-results on nightly failure. Always on for scheduled runs; opt-in for manual triggers."
        type: boolean
        default: false
  schedule:
    - cron: '0 9 * * 1-5'  # 09:00 UTC, Mon-Fri (resolves to mode=nightly, version=latest-prerelease via 'auto')

concurrency:
  # Separate groups per mode so a publish run doesn't cancel an in-flight nightly.
  group: release-screenshots-${{ inputs.mode || 'nightly' }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write  # for AWS OIDC role-assumption in upload-report-to-s3

# Normalize inputs once. Scheduled (cron) events do not populate inputs.*,
# so we fall back to nightly defaults here and use env.MODE / env.VERSION_INPUT
# everywhere downstream.
env:
  MODE: ${{ inputs.mode || 'nightly' }}
  VERSION_INPUT: ${{ inputs.version || 'auto' }}

jobs:
  release-screenshots:
    name: screenshots-${{ inputs.mode || 'nightly' }}
    runs-on: macos-latest-xlarge
    steps:
      - name: Checkout positron
        uses: actions/checkout@v7

      - name: Generate POSITRON_BOT token
        id: bot-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.POSITRON_BOT_APP_ID }}
          private-key: ${{ secrets.POSITRON_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Resolve version
        id: version
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          INPUT: ${{ env.VERSION_INPUT }}
        run: |
          # 'auto' picks the per-mode default: latest-prerelease for nightly,
          # latest-release for publish. Cron + the dispatch default both land
          # here so each mode gets the right build channel without the user
          # having to remember.
          if [[ "$INPUT" == "auto" ]]; then
            if [[ "$MODE" == "publish" ]]; then
              INPUT="latest-release"
            else
              INPUT="latest-prerelease"
            fi
          fi
          case "$INPUT" in
            latest-prerelease)
              # positron-builds flags EVERY tag as prerelease=true, including
              # stable releases mirrored in from posit-dev/positron. A mirrored
              # stable build can be the newest entry by created_at, so a plain
              # ".[0]" would pick stable instead of the dev pre-release we want.
              # Exclude any tag that exists as a release on posit-dev/positron
              # (those are the stable ones) and take the newest dev build left.
              STABLE_TAGS=$(gh api "repos/posit-dev/positron/releases?per_page=100" --jq '[.[].tag_name]')
              VERSION=$(gh api "repos/posit-dev/positron-builds/releases?per_page=100" \
                --jq '[.[] | select(.prerelease == true) | .tag_name]' \
                | jq -r --argjson stable "$STABLE_TAGS" '(. - $stable) | .[0]')
              ;;
            latest-release)
              # Stable releases are flagged on posit-dev/positron; positron-builds
              # marks every tag as prerelease=true, so filtering there returns nothing.
              VERSION=$(gh api "repos/posit-dev/positron/releases/latest" --jq '.tag_name')
              ;;
            *)
              VERSION="$INPUT"
              ;;
          esac
          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            echo "::error::Could not resolve version from '$INPUT'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Download Positron build
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
        run: |
          OUTPUT=$(.github/scripts/release-screenshots/download-build.sh "${{ steps.version.outputs.version }}")
          echo "$OUTPUT" >> "$GITHUB_ENV"

      - name: Load secrets
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ANTHROPIC_KEY: "op://Positron/Anthropic/credential"
          OPENAI_KEY: "op://Positron/OpenAI/credential"
          MS_FOUNDRY_KEY: "op://Positron/MS-Foundry-East2TestAI/credential"
          MS_FOUNDRY_BASE_URL: "op://Positron/MS-Foundry-East2TestAI/hostname"
          POSIT_AUTH_HOST: "op://Positron/Posit-AI-Login/website"
          POSIT_EMAIL: "op://Positron/Posit-AI-Login/username"
          POSIT_PASSWORD: "op://Positron/Posit-AI-Login/password"

      - name: Setup release-screenshot runtimes
        id: runtimes
        uses: ./.github/actions/setup-release-screenshot-runtimes

      - name: Pre-warm matplotlib font cache
        run: python -c "import matplotlib.pyplot as plt; plt.figure()"

      - name: Clone positron-website (public)
        if: env.MODE == 'nightly'
        run: |
          git clone --depth 1 https://github.com/posit-dev/positron-website.git \
            "$RUNNER_TEMP/positron-website"

      - name: Clone positron-website (authenticated, for push)
        if: env.MODE == 'publish'
        env:
          BOT_TOKEN: ${{ steps.bot-token.outputs.token }}
        run: |
          git clone --depth 1 \
            "https://x-access-token:${BOT_TOKEN}@github.com/posit-dev/positron-website.git" \
            "$RUNNER_TEMP/positron-website"

      - name: Send Results to GH Summary
        uses: ./.github/actions/gen-report-dir
        with:
          identifier: release-screenshots-${{ env.MODE }}

      # Wait for bundled extensions (quarto, air, etc.) to finish bootstrapping
      # so language-aware screenshots have the full set of languages and
      # completions available. Mirrors the bootstrap step in the e2e workflows.
      - name: Wait for bootstrap extensions
        env:
          POSITRON_PY_VER_SEL: ${{ steps.runtimes.outputs.python-primary-version }}
          POSITRON_R_VER_SEL: '4.5.2'
        run: npx playwright test test/e2e/tests/extensions/bootstrap-extensions.test.ts --project e2e-electron --reporter=null

      - name: Run release-screenshots project
        env:
          POSITRON_PY_VER_SEL: ${{ steps.runtimes.outputs.python-primary-version }}
          POSITRON_R_VER_SEL: '4.5.2'
          POSITRON_PY_ALT_VER_SEL: ${{ steps.runtimes.outputs.python-alt-version }}
          POSITRON_R_ALT_VER_SEL: '4.4.2'
          ANTHROPIC_KEY: ${{ env.ANTHROPIC_KEY }}
          OPENAI_KEY: ${{ env.OPENAI_KEY }}
          POSIT_AUTH_HOST: ${{ env.POSIT_AUTH_HOST }}
          POSIT_EMAIL: ${{ env.POSIT_EMAIL }}
          POSIT_PASSWORD: ${{ env.POSIT_PASSWORD }}
          ENABLE_CUSTOM_REPORTER: 'false'
          GH_SUMMARY_REPORT: 'true'
          # Keep Playwright traces for every test (pass or fail) — debugging
          # screenshot drift after the fact is much easier with a trace.
          PW_TRACE: 'on'
          # CDP setDeviceMetricsOverride forces the renderer to lay out at
          # this size internally regardless of OS window clamping. Same 8:5
          # aspect ratio as the historical 1680x1050 config but scaled down
          # so text and chrome read proportionally larger in docs.
          POSITRON_SCREENSHOT_VIEWPORT: '1512,945'
          # Bootstrap already verified above; skip the bootstrap test inside
          # the suite, and skip the workspace clone since globalSetup already
          # populated it during the bootstrap run (re-running cp -R fails on
          # the read-only .git/objects/pack files left behind).
          SKIP_BOOTSTRAP: 'true'
          SKIP_CLONE: 'true'
        run: npx playwright test --project release-screenshots --workers 2 --max-failures=2

      - name: Upload Playwright Report to S3
        if: ${{ success() || failure() }}
        continue-on-error: true
        uses: ./.github/actions/upload-report-to-s3
        with:
          role-to-assume: ${{ secrets.AWS_TEST_REPORTS_ROLE }}
          report-dir: ${{ env.REPORT_DIR }}

      - name: Compare and report
        id: compare
        if: ${{ success() || failure() }}
        env:
          SCREENSHOT_BASE_URL: https://d38p2avprg8il3.cloudfront.net/${{ env.REPORT_DIR }}/screenshots
          POSITRON_VERSION: ${{ steps.version.outputs.version }}
        run: |
          DOCS_IMAGE_COMMIT_SHA=$(git -C "$RUNNER_TEMP/positron-website" rev-parse HEAD)
          DOCS_IMAGE_COMMIT_SHA="$DOCS_IMAGE_COMMIT_SHA" node .github/scripts/release-screenshots/compare-and-report.mjs \
            test/e2e/release-screenshots/output \
            "$RUNNER_TEMP/positron-website/images" \
            "$RUNNER_TEMP/classification.json"

      - name: Upload generated screenshots to S3
        if: ${{ success() || failure() }}
        run: |
          aws s3 cp test/e2e/release-screenshots/output/ \
            "s3://positron-test-reports/${REPORT_DIR}/screenshots/" \
            --recursive

      - name: Upload generated screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.MODE }}-screenshots
          path: test/e2e/release-screenshots/output/
          if-no-files-found: warn

      - name: Upload Playwright traces and test-results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.MODE }}-test-results
          path: test-results/
          if-no-files-found: ignore

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.MODE }}-playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      # ===== Publish-only tail =====

      - name: Decide publish action
        if: env.MODE == 'publish'
        id: gate
        run: |
          CHANGED="${{ steps.compare.outputs.changed_count }}"
          NEW="${{ steps.compare.outputs.new_count }}"
          TOTAL=$((CHANGED + NEW))
          echo "changed=$CHANGED new=$NEW total=$TOTAL"
          if [[ "$TOTAL" -eq 0 ]]; then
            echo "decision=skip-no-changes" >> "$GITHUB_OUTPUT"
          elif [[ "${{ inputs.open_pr }}" == "false" ]]; then
            echo "decision=skip-dry-run" >> "$GITHUB_OUTPUT"
          else
            echo "decision=publish" >> "$GITHUB_OUTPUT"
          fi

      - name: Log no-op exit
        if: env.MODE == 'publish' && steps.gate.outputs.decision != 'publish'
        run: |
          echo "Decision: ${{ steps.gate.outputs.decision }}"
          echo "::notice::Exiting without opening a PR (${{ steps.gate.outputs.decision }})"

      - name: Copy changed and new images into docs site
        if: env.MODE == 'publish' && steps.gate.outputs.decision == 'publish'
        env:
          CLS: ${{ runner.temp }}/classification.json
          GENERATED: test/e2e/release-screenshots/output
        run: |
          set -euo pipefail
          export DOCS_IMAGES="$RUNNER_TEMP/positron-website/images"
          # Apply changed/new entries from classification.json. When docsName
          # exists and differs from name (e.g. .jpeg -> .png), delete the old
          # docs file before copying the replacement.
          node -e '
            const fs = require("fs");
            const path = require("path");
            const c = require(process.env.CLS);
            for (const [name, info] of Object.entries(c)) {
              if (info.status !== "changed" && info.status !== "new") continue;
              if (info.docsName && info.docsName !== name) {
                const old = path.join(process.env.DOCS_IMAGES, info.docsName);
                console.log(`Removing old docs file: ${info.docsName}`);
                fs.rmSync(old, { force: true });
              }
              console.log(`Copying ${name}`);
              fs.copyFileSync(
                path.join(process.env.GENERATED, name),
                path.join(process.env.DOCS_IMAGES, name),
              );
            }
          '

      - name: Commit and push branch
        if: env.MODE == 'publish' && steps.gate.outputs.decision == 'publish'
        id: push
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # Push uses credentials embedded by the earlier authenticated clone.
          DOCS="$RUNNER_TEMP/positron-website"
          BRANCH="screenshots/${VERSION}-${{ github.run_id }}"
          cd "$DOCS"
          git config user.name "positron-bot[bot]"
          git config user.email "positron-bot[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add images/
          git commit -m "Update screenshots for Positron $VERSION"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        if: env.MODE == 'publish' && steps.gate.outputs.decision == 'publish'
        id: open-pr
        env:
          CLS: ${{ runner.temp }}/classification.json
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
          BRANCH: ${{ steps.push.outputs.branch }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPORT_URL: https://d38p2avprg8il3.cloudfront.net/${{ env.REPORT_DIR }}/screenshots/report.html
        run: |
          set -euo pipefail
          DOCS="$RUNNER_TEMP/positron-website"
          # Build a body that lists changed/new files from classification.json.
          BODY_LIST=$(node -e '
            const c = require(process.env.CLS);
            const lines = [];
            for (const [name, info] of Object.entries(c).sort()) {
              if (info.status === "changed") {
                const note = info.docsName && info.docsName !== name
                  ? `replaces \`${info.docsName}\``
                  : "changed";
                lines.push(`- 🔄 \`${name}\` (${note})`);
              }
              if (info.status === "new") lines.push(`- 🆕 \`${name}\` (new)`);
            }
            console.log(lines.join("\n"));
          ')
          BODY=$(printf '%s\n\n%s\n\n%s\n%s\n' \
            "Refresh of release screenshots for Positron \`$VERSION\`." \
            "$BODY_LIST" \
            "Generated by [this workflow run]($RUN_URL)." \
            "[Open full screenshot report ↗]($REPORT_URL)")
          cd "$DOCS"
          PR_URL=$(gh pr create \
            --repo posit-dev/positron-website \
            --head "$BRANCH" \
            --base "$(gh repo view posit-dev/positron-website --json defaultBranchRef --jq .defaultBranchRef.name)" \
            --title "Update screenshots for Positron $VERSION" \
            --body "$BODY")
          echo "Opened PR: $PR_URL"
          PR_NUMBER="${PR_URL##*/}"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          # Reviewer assignment is best-effort - if the user isn't a collaborator
          # on the target repo (422), don't fail the workflow over it.
          gh pr edit "$PR_URL" --add-reviewer marieidleman \
            || echo "::warning::Could not assign reviewer marieidleman (not a collaborator?)"

      - name: Notify Slack on publish success
        if: env.MODE == 'publish' && steps.gate.outputs.decision == 'publish'
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN_TEST_STATUS }}
          PR_URL: ${{ steps.open-pr.outputs.pr_url }}
          PR_NUMBER: ${{ steps.open-pr.outputs.pr_number }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg channel "#positron-dev" \
              --arg pr_url "$PR_URL" \
              --arg pr_number "$PR_NUMBER" \
              --arg version "$VERSION" \
              '{
                channel: $channel,
                text: ("📸 *Screenshots Updated · Positron " + $version + "* · <" + $pr_url + "|PR #" + $pr_number + ">")
              }')"

  slack-notify:
    # Notify on cron failures always; manual runs only when the box is checked.
    # Use github.event_name instead of comparing inputs.slack_notify to a string
    # literal -- boolean inputs don't reliably coerce to strings in expressions.
    if: >-
      ${{ failure() &&
          (inputs.mode || 'nightly') == 'nightly' &&
          (github.event_name == 'schedule' || inputs.slack_notify == true) }}
    needs: [release-screenshots]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        uses: midleman/slack-workflow-status@v3.1.3
        with:
          gh_repo_token: ${{ secrets.GITHUB_TOKEN }}
          slack_token: ${{ secrets.SLACK_TOKEN_TEST_STATUS }}
          slack_channel: "#positron-test-results"
          notify_on: "failure"
