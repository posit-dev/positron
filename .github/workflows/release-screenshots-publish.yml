name: "Publish: Release Screenshots"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Positron release tag to test against (or 'latest-release')"
        type: string
        default: latest-release
      dry_run:
        description: 'Run everything but skip opening the PR'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-screenshots-publish
  cancel-in-progress: true

jobs:
  publish:
    name: screenshots-publish
    runs-on: macos-latest
    steps:
      - name: Checkout positron
        uses: actions/checkout@v6

      - name: Generate POSITRON_BOT token
        id: bot-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.POSITRON_BOT_APP_ID }}
          private-key: ${{ secrets.POSITRON_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Resolve version
        id: version
        run: |
          INPUT="${{ inputs.version }}"
          if [[ "$INPUT" == "latest-release" ]]; then
            VERSION=$(gh api "repos/posit-dev/positron-builds/releases?per_page=100" \
              --jq '[.[] | select(.prerelease == false)] | .[0].tag_name')
          else
            VERSION="$INPUT"
          fi
          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            echo "::error::No release found for version input '$INPUT'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}

      - name: Download Positron build
        run: |
          OUTPUT=$(.github/scripts/release-screenshots/download-build.sh "${{ steps.version.outputs.version }}")
          echo "$OUTPUT" >> "$GITHUB_ENV"
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install npm dependencies
        run: npm ci --ignore-scripts
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Install test/e2e dependencies
        run: npm --prefix test/e2e ci --prefer-offline --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Clone qa-example-content
        run: |
          git clone --depth 1 https://github.com/posit-dev/qa-example-content.git \
            test/e2e/qa-example-content

      - name: Clone positron-website
        env:
          BOT_TOKEN: ${{ steps.bot-token.outputs.token }}
        run: |
          git clone --depth 1 \
            "https://x-access-token:${BOT_TOKEN}@github.com/posit-dev/positron-website.git" \
            "$RUNNER_TEMP/positron-website"

      - name: Setup Python (primary)
        id: setup-python-primary
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: test/e2e/qa-example-content/requirements.txt

      - name: Install Python dependencies (primary)
        run: |
          python -m pip install --upgrade pip
          pip install -r test/e2e/qa-example-content/requirements.txt
          pip install ipykernel

      - name: Setup Python (alternate)
        id: setup-python-alt
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install ipykernel for alternate Python
        run: |
          python --version
          pip install ipykernel

      - name: Install rig
        run: |
          brew tap r-lib/rig
          brew install --cask rig

      - name: Install R (primary)
        run: |
          rig add 4.5.2
          R --version

      - name: Install R packages
        working-directory: test/e2e/qa-example-content
        run: |
          Rscript -e "if (!requireNamespace('pak', quietly = TRUE)) install.packages('pak', repos = 'https://cran.rstudio.com')"
          Rscript -e "options(pak.install_binary = TRUE); pak::local_install_dev_deps(ask = FALSE, upgrade = FALSE)"

      - name: Install R (alternate)
        run: rig add 4.4.2

      - name: Run release-screenshots project
        env:
          POSITRON_PY_VER_SEL: ${{ steps.setup-python-primary.outputs.python-version }}
          POSITRON_R_VER_SEL: '4.5.2'
          POSITRON_PY_ALT_VER_SEL: ${{ steps.setup-python-alt.outputs.python-version }}
          POSITRON_R_ALT_VER_SEL: '4.4.2'
          ENABLE_CUSTOM_REPORTER: 'false'
          GH_SUMMARY_REPORT: 'true'
          POSITRON_WINDOW_SIZE: '1600,1000'
        run: npx playwright test --project release-screenshots --workers 1

      - name: Upload Playwright traces and test-results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: publish-test-results
          path: test-results/
          if-no-files-found: ignore

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: publish-playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Compare and report
        id: compare
        run: |
          node .github/scripts/release-screenshots/compare-and-report.mjs \
            test/e2e/release-screenshots/output \
            "$RUNNER_TEMP/positron-website/images" \
            "$RUNNER_TEMP/classification.json"

      - name: Decide publish action
        id: gate
        run: |
          CHANGED="${{ steps.compare.outputs.changed_count }}"
          NEW="${{ steps.compare.outputs.new_count }}"
          TOTAL=$((CHANGED + NEW))
          echo "changed=$CHANGED new=$NEW total=$TOTAL"
          if [[ "$TOTAL" -eq 0 ]]; then
            echo "decision=skip-no-changes" >> "$GITHUB_OUTPUT"
          elif [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "decision=skip-dry-run" >> "$GITHUB_OUTPUT"
          else
            echo "decision=publish" >> "$GITHUB_OUTPUT"
          fi

      - name: Log no-op exit
        if: steps.gate.outputs.decision != 'publish'
        run: |
          echo "Decision: ${{ steps.gate.outputs.decision }}"
          echo "::notice::Exiting without opening a PR (${{ steps.gate.outputs.decision }})"

      - name: Copy changed and new images into docs site
        if: steps.gate.outputs.decision == 'publish'
        run: |
          set -euo pipefail
          GENERATED=test/e2e/release-screenshots/output
          DOCS="$RUNNER_TEMP/positron-website"
          # Read classification.json and copy only changed/new files.
          NAMES=$(node -e '
            const c = require(process.env.CLS);
            for (const [name, info] of Object.entries(c)) {
              if (info.status === "changed" || info.status === "new") {
                console.log(name);
              }
            }
          ')
          while IFS= read -r name; do
            [[ -z "$name" ]] && continue
            echo "Copying $name"
            cp "$GENERATED/$name" "$DOCS/images/$name"
          done <<< "$NAMES"
        env:
          CLS: ${{ runner.temp }}/classification.json

      - name: Commit and push branch
        if: steps.gate.outputs.decision == 'publish'
        id: push
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # Push uses credentials embedded by the earlier authenticated clone.
          DOCS="$RUNNER_TEMP/positron-website"
          BRANCH="screenshots/${VERSION}-${{ github.run_id }}"
          cd "$DOCS"
          git config user.name "positron-bot[bot]"
          git config user.email "positron-bot[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add images/
          git commit -m "Update screenshots for Positron $VERSION"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        if: steps.gate.outputs.decision == 'publish'
        env:
          CLS: ${{ runner.temp }}/classification.json
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
          BRANCH: ${{ steps.push.outputs.branch }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          DOCS="$RUNNER_TEMP/positron-website"
          # Build a body that lists changed/new files from classification.json.
          BODY_LIST=$(node -e '
            const c = require(process.env.CLS);
            const lines = [];
            for (const [name, info] of Object.entries(c).sort()) {
              if (info.status === "changed") lines.push(`- 🔄 \`${name}\` (changed)`);
              if (info.status === "new")     lines.push(`- 🆕 \`${name}\` (new)`);
            }
            console.log(lines.join("\n"));
          ')
          BODY=$(printf '%s\n\n%s\n\n%s\n' \
            "Refresh of release screenshots for Positron \`$VERSION\`." \
            "$BODY_LIST" \
            "Generated by [this workflow run]($RUN_URL).")
          cd "$DOCS"
          PR_URL=$(gh pr create \
            --repo posit-dev/positron-website \
            --head "$BRANCH" \
            --base "$(gh repo view posit-dev/positron-website --json defaultBranchRef --jq .defaultBranchRef.name)" \
            --title "Update screenshots for Positron $VERSION" \
            --body "$BODY")
          echo "Opened PR: $PR_URL"
          # Reviewer assignment is best-effort - if the user isn't a collaborator
          # on the target repo (422), don't fail the workflow over it.
          gh pr edit "$PR_URL" --add-reviewer marieidleman \
            || echo "::warning::Could not assign reviewer marieidleman (not a collaborator?)"
