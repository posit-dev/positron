name: "Publish: Release Screenshots"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Positron release tag to test against (or 'latest-release')"
        type: string
        default: latest-release
      dry_run:
        description: 'Run everything but skip opening the PR'
        type: boolean
        default: false

concurrency:
  group: release-screenshots-publish
  cancel-in-progress: true

jobs:
  run:
    uses: ./.github/workflows/release-screenshots.yml
    with:
      mode: publish
      version: ${{ inputs.version }}
      dry_run: ${{ inputs.dry_run }}
    secrets: inherit
