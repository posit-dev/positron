name: "Analyze E2E Failures"

on:
  workflow_dispatch:
    inputs:
      run_url:
        description: "Full GitHub Actions run URL to analyze"
        required: true
        type: string
      model:
        description: "Anthropic model (a tier alias like 'opus' always resolves to the latest)"
        required: false
        default: "opus"
        type: string
  workflow_call:
    inputs:
      run_url:
        description: "Full GitHub Actions run URL to analyze"
        required: true
        type: string
      model:
        description: "Anthropic model (a tier alias like 'opus' always resolves to the latest)"
        required: false
        default: "opus"
        type: string

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Need:
          # - .claude/skills/e2e-failure-analyzer/scripts (extraction helpers)
          # - .github/actions/e2e-failure-analyzer (the action itself)
          # - test/e2e/{tests,pages,fixtures,infra} so the analyzer can read
          #   failing test source, page objects, fixture configs, and the
          #   workbench/driver helpers that startup-or-teardown failures often
          #   route through.
          # - test/e2e/{CLAUDE.md,README.md} for repo-specific test conventions.
          # - playwright.config.ts for worker/parallelism settings (e.g. workers,
          #   fullyParallel) needed to reason about shared-workspace teardown races.
          # - src/ and extensions/ so the analyzer can read the PRODUCT source a
          #   failure exercises -- required to tell a real code regression from a
          #   test-side issue (stale selector, duplicated-logic drift), and to
          #   confirm an open-path bug in the handler behind a fired command. The
          #   rubric already directs the model to read product source; without
          #   these it cannot. The culprit often lives in extensions/ (e.g. the
          #   positron-python interpreter picker), not just src/, so include both.
          sparse-checkout: |
            .claude/skills/e2e-failure-analyzer
            .github/actions/e2e-failure-analyzer
            test/e2e/tests
            test/e2e/pages
            test/e2e/fixtures
            test/e2e/infra
            test/e2e/CLAUDE.md
            test/e2e/README.md
            playwright.config.ts
            src
            extensions

      - name: Load secret
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ANTHROPIC_KEY: "op://Positron/Anthropic/credential"
          E2E_INSIGHTS_KEY: "op://Positron/E2E_dashboard_api_key/credential"

      - name: Run analyzer
        uses: ./.github/actions/e2e-failure-analyzer
        with:
          run-url: ${{ inputs.run_url }}
          anthropic-api-key: ${{ env.ANTHROPIC_KEY }}
          e2e-insights-api-key: ${{ env.E2E_INSIGHTS_KEY }}
          webhook-secret: ${{ secrets.E2E_INSIGHTS_WEBHOOK_SECRET }}
          model: ${{ inputs.model }}
