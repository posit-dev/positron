name: "Spike: Windows zstd availability"

on:
  workflow_dispatch:

jobs:
  test-zstd:
    name: test-zstd
    runs-on: windows-latest-8x
    steps:
      - name: Check zstd availability
        shell: bash
        run: |
          echo "=== zstd availability ==="
          if command -v zstd >/dev/null 2>&1; then
            echo "✓ zstd found: $(command -v zstd)"
            zstd --version
          else
            echo "✗ zstd not found in PATH"
            echo "PATH: $PATH"
          fi

      - name: Test zstd compress + decompress roundtrip
        shell: bash
        run: |
          WORK_DIR="$(cygpath -u "${RUNNER_TEMP}")/zstd-test"
          mkdir -p "${WORK_DIR}/source/subdir"

          # Create some test files of varying sizes
          echo "hello world" > "${WORK_DIR}/source/file1.txt"
          dd if=/dev/urandom bs=1M count=10 2>/dev/null | base64 > "${WORK_DIR}/source/subdir/bigfile.txt"
          for i in $(seq 1 100); do echo "test file $i" > "${WORK_DIR}/source/subdir/file${i}.txt"; done

          echo "Source size: $(du -sh "${WORK_DIR}/source")"

          # Compress with zstd
          echo ""
          echo "=== Compressing with zstd -T0 -1 ==="
          START=$(date +%s%N)
          tar -C "${WORK_DIR}" \
            --use-compress-program='zstd -T0 -1' \
            -cf "${WORK_DIR}/test.tar.zst" \
            source
          END=$(date +%s%N)
          echo "Compress time: $(( (END - START) / 1000000 ))ms"
          echo "Compressed size: $(du -sh "${WORK_DIR}/test.tar.zst")"

          # Decompress with zstd -d -T0 --stdout | tar -x  (same as run workflow)
          echo ""
          echo "=== Decompressing with zstd -d -T0 --stdout | tar -x ==="
          mkdir -p "${WORK_DIR}/dest"
          START=$(date +%s%N)
          zstd -d -T0 --stdout "${WORK_DIR}/test.tar.zst" | \
            tar --no-same-owner --no-same-permissions -x -C "${WORK_DIR}/dest"
          END=$(date +%s%N)
          echo "Decompress time: $(( (END - START) / 1000000 ))ms"

          # Verify roundtrip
          echo ""
          echo "=== Verifying roundtrip ==="
          if diff -r "${WORK_DIR}/source" "${WORK_DIR}/dest/source" >/dev/null 2>&1; then
            echo "✓ Roundtrip verified — source and dest match"
          else
            echo "✗ Roundtrip FAILED — source and dest differ"
            diff -r "${WORK_DIR}/source" "${WORK_DIR}/dest/source" | head -20
            exit 1
          fi

      - name: Compare gzip vs zstd on a larger payload
        shell: bash
        run: |
          WORK_DIR="$(cygpath -u "${RUNNER_TEMP}")/zstd-compare"
          mkdir -p "${WORK_DIR}/source"

          # ~50MB of mixed content (simulate a small workspace)
          dd if=/dev/urandom bs=1M count=20 2>/dev/null | base64 > "${WORK_DIR}/source/random.txt"
          for i in $(seq 1 500); do echo "node_modules style file $i with some content padding" > "${WORK_DIR}/source/module${i}.js"; done

          echo "Source size: $(du -sh "${WORK_DIR}/source")"
          echo ""

          # gzip
          START=$(date +%s%N)
          tar -C "${WORK_DIR}" -czf "${WORK_DIR}/test.tar.gz" source
          GZ_COMPRESS=$(( ($(date +%s%N) - START) / 1000000 ))
          GZ_SIZE=$(du -sh "${WORK_DIR}/test.tar.gz" | cut -f1)

          START=$(date +%s%N)
          tar --no-same-owner -xzf "${WORK_DIR}/test.tar.gz" -C "${WORK_DIR}/dest-gz"
          GZ_DECOMPRESS=$(( ($(date +%s%N) - START) / 1000000 ))

          # zstd
          mkdir -p "${WORK_DIR}/dest-zst"
          START=$(date +%s%N)
          tar -C "${WORK_DIR}" --use-compress-program='zstd -T0 -1' -cf "${WORK_DIR}/test.tar.zst" source
          ZST_COMPRESS=$(( ($(date +%s%N) - START) / 1000000 ))
          ZST_SIZE=$(du -sh "${WORK_DIR}/test.tar.zst" | cut -f1)

          START=$(date +%s%N)
          zstd -d -T0 --stdout "${WORK_DIR}/test.tar.zst" | tar --no-same-owner -x -C "${WORK_DIR}/dest-zst"
          ZST_DECOMPRESS=$(( ($(date +%s%N) - START) / 1000000 ))

          echo "          | size   | compress | decompress"
          echo "----------|--------|----------|----------"
          echo "gzip      | ${GZ_SIZE}  | ${GZ_COMPRESS}ms     | ${GZ_DECOMPRESS}ms"
          echo "zstd -T0  | ${ZST_SIZE}  | ${ZST_COMPRESS}ms     | ${ZST_DECOMPRESS}ms"
