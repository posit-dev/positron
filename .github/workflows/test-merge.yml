name: "Test: Merge to branch"

on:
  push:
    branches:
      - main
      - "prerelease/**"
      - "release/**"
  # TEMPORARY: trigger once on this PR to validate the new shard counts.
  # Revert this block before merging.
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/test-merge.yml

jobs:
  setup-ubuntu:
    name: setup
    uses: ./.github/workflows/test-e2e-ubuntu-build.yml
    secrets: inherit

  e2e-electron:
    name: e2e
    needs: [setup-ubuntu]
    uses: ./.github/workflows/test-e2e-ubuntu-run.yml
    with:
      grep: ""
      project: "e2e-electron"
      display_name: "electron"
      install_undetectable_interpreters: false
      install_license: false
      upload_logs: false
      shards: 6
      matrix: '{"shard":[1,2,3,4,5,6]}'
      workers: 2
      allow_soft_fail: true
      max_failures: 4  # 20 max failures / 6 shards = 3.33, rounded up to 4
    secrets: inherit

  setup-windows:
    name: setup
    uses: ./.github/workflows/test-e2e-windows-build.yml
    secrets: inherit
    with:
      save_cache: true

  e2e-windows:
    name: e2e
    needs: [setup-windows]
    uses: ./.github/workflows/test-e2e-windows-run.yml
    secrets: inherit
    with:
      grep: ""
      project: "e2e-windows"
      display_name: "electron-win"
      allow_soft_fail: true
      upload_logs: false
      shards: 6
      matrix: '{"shard":[1,2,3,4,5,6]}'
      max_failures: 4  # 20 max failures / 6 shards = 3.33, rounded up to 4

  e2e-ubuntu-chromium:
    name: e2e
    needs: [setup-ubuntu]
    uses: ./.github/workflows/test-e2e-ubuntu-run.yml
    with:
      grep: ""
      display_name: "chromium"
      project: "e2e-chromium"
      install_undetectable_interpreters: false
      install_license: true
      upload_logs: true
      shards: 6
      matrix: '{"shard":[1,2,3,4,5,6]}'
      workers: 2
      allow_soft_fail: true
      max_failures: 4  # 20 max failures / 6 shards = 3.33, rounded up to 4
    secrets: inherit

  unit-tests:
    name: test
    uses: ./.github/workflows/test-unit.yml
    secrets: inherit
    with:
      save_cache: true  # Saves Ubuntu caches for subsequent runs

  ext-host-tests:
    name: test
    uses: ./.github/workflows/test-ext-host.yml
    secrets: inherit
    with:
      pull_request: false

