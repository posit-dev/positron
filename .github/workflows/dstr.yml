name: "Review: Data Science Test Design (/dstr)"

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  dstr:
    if: >
      github.event.issue.pull_request &&
      contains(fromJSON('["MEMBER","COLLABORATOR","OWNER"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest

    steps:
      - name: Strip whitespace from comment body
        id: strip_comment
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          printf 'body=%s\n' "$COMMENT_BODY" |
            sed '/^[[:space:]]*$/d; s/^[[:space:]]*//; s/[[:space:]]*$//' |
            head -n 1 >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        if: steps.strip_comment.outputs.body == '/dstr'

      - uses: actions/setup-node@v4
        if: steps.strip_comment.outputs.body == '/dstr'
        with:
          node-version: 22

      - name: Load secret
        if: steps.strip_comment.outputs.body == '/dstr'
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ANTHROPIC_KEY: "op://Positron/Anthropic/credential"

      - name: Install dependencies
        if: steps.strip_comment.outputs.body == '/dstr'
        run: npm ci --prefix .github/scripts/dstr

      - name: Run /dstr review
        if: steps.strip_comment.outputs.body == '/dstr'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_KEY }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node .github/scripts/dstr/review.mjs
