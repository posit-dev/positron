name: "Test: E2E Workbench (Ubuntu)"

on:
  workflow_call:
    inputs:
      grep:
        required: false
        description: "Only run tests matching this regex. Supports tags (comma-separated), titles, filenames."
        default: "@:workbench"
        type: string
      display_name:
        required: false
        description: "The name of the job as it will appear in the GitHub Actions UI."
        default: "e2e-workbench"
        type: string
      install_license:
        required: false
        description: "Whether or not to install positron-license"
        type: boolean
        default: false
      upload_logs:
        required: false
        description: "Whether or not to upload e2e test logs."
        type: boolean
        default: true
      allow_soft_fail:
        required: false
        description: "Whether to allow tests marked with :soft-fail to fail without failing the job."
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read
  packages: read

jobs:
  e2e-workbench:
    name: ${{ inputs.display_name || 'e2e-workbench' }}
    timeout-minutes: 120
    runs-on: ubuntu-latest-8x

    env:
      POSITRON_BUILD_NUMBER: 0
      E2E_POSTGRES_USER: ${{ secrets.E2E_POSTGRES_USER }}
      E2E_POSTGRES_PASSWORD: ${{ secrets.E2E_POSTGRES_PASSWORD }}
      E2E_POSTGRES_DB: ${{ secrets.E2E_POSTGRES_DB }}
      POSIT_WORKBENCH_PASSWORD: ${{ secrets.WB_PASSWORD }}
      WB_PASSWORD: ${{ secrets.WB_PASSWORD }}
      CONNECT_BOOTSTRAP_SECRETKEY: ${{ secrets.CONNECT_BOOTSTRAP_SECRETKEY }}
      HOME: /home/runner
      AWS_S3_BUCKET: positron-test-reports
      R_LIBS_SITE: /usr/local/lib/R/site-library
      R_LIBS_USER: /usr/local/lib/R/site-library
      GH_SUMMARY_REPORT: true

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Generate access token for private repos
        id: access-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.POSITRON_BOT_APP_ID }}
          private-key: ${{ secrets.POSITRON_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Setup AWS S3 Access
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.QA_AWS_RO_ROLE }}
          aws-region: ${{ secrets.QA_AWS_REGION }}

      - name: Load secret
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ANTHROPIC_KEY: "op://Positron/Anthropic/credential"
          OPENAI_KEY: "op://Positron/OpenAI/credential"
          POSIT_AUTH_HOST: "op://Positron/Posit-AI-Login/website"
          POSIT_EMAIL: "op://Positron/Posit-AI-Login/username"
          POSIT_PASSWORD: "op://Positron/Posit-AI-Login/password"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install jq for JSON parsing
        run: |
          sudo apt-get update && sudo apt-get install -y jq

      - name: Download workbench artifact
        uses: actions/download-artifact@v8
        with:
          name: "positron-workbench-linux-x64"
          path: /tmp/artifacts

      - name: Docker login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.POSITRON_GITHUB_RO_USER }}
          password: ${{ secrets.POSITRON_GITHUB_RO_PAT }}

      - name: Setup Workbench Docker Environment
        uses: ./.github/actions/setup-workbench-docker
        with:
          install-mode: ci
          wb-password: ${{ secrets.WB_PASSWORD }}
          github-token: ${{ steps.access-token.outputs.token }}
          run-id: ${{ github.run_id }}
          custom-positron-tarball: /tmp/artifacts/positron-workbench-linux-x64-branch.tar.gz

      - name: Setup test dependencies and compile tests
        uses: ./.github/actions/setup-e2e-test-dependencies

      - name: Alter AppArmor Restrictions for Playwright
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Setup Xvfb
        uses: ./.github/actions/setup-xvfb

      - name: Generate Report Directory
        uses: ./.github/actions/gen-report-dir
        with:
          identifier: e2e-workbench

      - name: 🧪 Run Playwright Workbench Tests
        shell: bash
        env:
          PLAYWRIGHT_BROWSERS_PATH: .playwright-browsers
          POSITRON_PY_VER_SEL: "3.10.12"
          POSITRON_R_VER_SEL: 4.5.2
          POSITRON_PY_ALT_VER_SEL: "3.13.0"
          POSITRON_R_ALT_VER_SEL: 4.4.2
          POSITRON_HIDDEN_PY: "3.12.10 Module"
          POSITRON_HIDDEN_R: 4.4.1
          COMMIT_INFO_MESSAGE: ${{ github.event.head_commit.message }}
          CONNECT_API_KEY: ${{ secrets.CONNECT_API_KEY }}
          USE_KEY: true
          PW_PROJECT_NAME: e2e-workbench
          REPORTER_REPO_NAME: positron
        run: |
          export DISPLAY=:10
          npx playwright test --project e2e-workbench --retries=1 --workers=1

      - name: Debug — dump Positron install resolution on failure
        if: failure()
        shell: bash
        run: |
          set +e
          echo "::group::Installed Positron directories"
          docker exec test ls -la /usr/lib/rstudio-server/bin/positron-server/
          echo "::endgroup::"

          echo "::group::Version of each install"
          docker exec test bash -c '
            for dir in /usr/lib/rstudio-server/bin/positron-server/*/; do
              echo "--- $dir ---"
              if [ -x "$dir/bin/positron-server" ]; then
                "$dir/bin/positron-server" --version 2>&1 | head -10
              else
                echo "no bin/positron-server"
              fi
            done
          '
          echo "::endgroup::"

          echo "::group::rserver log lines about Positron path resolution"
          docker exec test bash -c '
            for log in /var/log/rstudio/rstudio-server/*.log /var/lib/rstudio-server/monitor/log/*.log; do
              [ -f "$log" ] || continue
              echo "--- $log ---"
              grep -E "Using Positron|Using bundled|positron-static|editor-exec-path|version mismatch" "$log" | tail -40
            done
          '
          echo "::endgroup::"

          echo "::group::Env vars seen by rserver process"
          docker exec test bash -c '
            pid=$(pgrep -o -x rserver)
            if [ -n "$pid" ]; then
              tr "\0" "\n" < /proc/$pid/environ | grep -iE "POSITRON|WORKBENCH|RS_"
            else
              echo "no rserver process"
            fi
          '
          echo "::endgroup::"

          echo "::group::positron.conf"
          docker exec test cat /etc/rstudio/positron.conf 2>&1 || true
          echo "::endgroup::"

          echo "::group::package.json in each install (product-label field)"
          docker exec test bash -c '
            for dir in /usr/lib/rstudio-server/bin/positron-server/*/; do
              echo "--- $dir ---"
              if [ -f "$dir/package.json" ]; then
                grep -E "\"(name|product-label|version)\"" "$dir/package.json" | head -5
              else
                echo "no package.json"
              fi
            done
          '
          echo "::endgroup::"

          echo "::group::Running positron-server processes and their actual binary paths"
          docker exec test bash -c '
            sudo bash -c "
              for pid in \$(pgrep -f positron-server); do
                echo \"PID \$pid: \$(readlink /proc/\$pid/exe 2>/dev/null || echo unreadable)\"
                cmdline=\$(tr \"\\0\" \" \" < /proc/\$pid/cmdline 2>/dev/null)
                echo \"  cmd: \$cmdline\"
              done
            " 2>&1 | head -30
          '
          echo "::endgroup::"

          echo "::group::Session log — actual POSITRON_EXEC_COMMAND used"
          docker exec test bash -c '
            sudo bash -c "
              for log in /var/log/rstudio/rstudio-launcher/*.log /var/log/rstudio/launcher/*.log /home/*/.local/share/rstudio/sessions/*/log /tmp/rstudio-rsession-*.log; do
                [ -f \$log ] || continue
                echo --- \$log ---
                grep -E \"Running session:|POSITRON_EXEC_COMMAND|positron-server\" \"\$log\" 2>/dev/null | tail -10
              done
            " 2>&1 | head -40
          '
          echo "::endgroup::"

          echo "::group::Generated nginx conf (positron-static block)"
          docker exec test bash -c '
            for conf in /var/lib/rstudio-server/conf/rserver-http.conf /etc/rstudio/rserver-http.conf; do
              [ -f "$conf" ] || continue
              echo "--- $conf ---"
              grep -B1 -A6 positron-static "$conf"
            done
          '
          echo "::endgroup::"

          echo "::group::Tail of rserver logs (last 200 lines)"
          docker exec test bash -c '
            for log in /var/log/rstudio/rstudio-server/*.log; do
              [ -f "$log" ] || continue
              echo "--- $log ---"
              tail -200 "$log"
            done
          '
          echo "::endgroup::"

      - name: Upload HTML report to S3
        if: always()
        uses: ./.github/actions/upload-report-to-s3
        with:
          role-to-assume: ${{ secrets.AWS_TEST_REPORTS_ROLE }}
          report-dir: ${{ env.REPORT_DIR }}

      - name: Upload Test Logs
        if: ${{ always() && inputs.upload_logs }}
        uses: actions/upload-artifact@v7
        with:
          name: e2e-workbench-ubuntu-logs
          path: test-logs
          retention-days: 3
          if-no-files-found: ignore

      - name: Stop Docker containers
        if: always()
        run: |
          docker compose -p ${{ github.run_id }} -f dockerfiles/docker-compose.workbench.yml down || true
