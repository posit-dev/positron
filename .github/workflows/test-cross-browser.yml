name: "Test: E2E Cross Browser"

on:
  schedule:
    - cron: '0 10 * * 1,4' # 4:00 AM CST = 10:00 UTC, Mon & Thu only
  workflow_dispatch:
    inputs:
      run_e2e_firefox:
        description: "E2E Tests / Firefox (Ubuntu)"
        required: false
        default: true
        type: boolean
      run_e2e_webkit:
        description: "E2E Tests / WebKit (Ubuntu)"
        required: false
        default: true
        type: boolean
      run_e2e_edge:
        description: "E2E Tests / Edge (Ubuntu)"
        required: false
        default: true
        type: boolean
      grep:
        required: false
        description: "Override default grep pattern. Leave empty to use config default (@:cross-browser)"
        default: ""
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: setup
    uses: ./.github/workflows/test-e2e-ubuntu-build.yml
    secrets: inherit

  e2e-firefox:
    name: e2e
    needs: [setup]
    uses: ./.github/workflows/test-e2e-ubuntu-run.yml
    secrets: inherit
    with:
      display_name: "firefox"
      project: "e2e-firefox"
      allow_soft_fail: false
      shards: 1
      matrix: '{"shard":[1]}'
      grep: ${{ inputs.grep }}
      grep_invert: "great-tables|notebook-focus-and-selection"

  e2e-webkit:
    name: e2e
    needs: [setup]
    uses: ./.github/workflows/test-e2e-ubuntu-run.yml
    secrets: inherit
    with:
      display_name: "webkit"
      project: "e2e-webkit"
      allow_soft_fail: false
      shards: 1
      matrix: '{"shard":[1]}'
      grep: ${{ inputs.grep }}
      grep_invert: "notebook-cell-action-bar|notebook-edit-mode|notebook-focus-and-selection"

  e2e-edge:
    name: e2e
    needs: [setup]
    uses: ./.github/workflows/test-e2e-ubuntu-run.yml
    secrets: inherit
    with:
      display_name: "edge"
      project: "e2e-edge"
      allow_soft_fail: false
      shards: 1
      matrix: '{"shard":[1]}'
      grep: ${{ inputs.grep }}

  slack-notify:
    if: always()
    needs:
      [e2e-firefox, e2e-webkit, e2e-edge]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        if: always()
        uses: actions/checkout@v7
        with:
          sparse-checkout: .github/actions/notify-e2e-insights

      - name: Notify E2E Test Insights
        if: always()
        uses: ./.github/actions/notify-e2e-insights
        with:
          webhook_secret: ${{ secrets.E2E_INSIGHTS_WEBHOOK_SECRET }}
          connect_api_key: ${{ secrets.CONNECT_API_KEY }}
          repo_id: "positron"
          title: "E2E Cross Browser Tests"
          filter_jobs: "(e2e / ([^0-9]*))$"
