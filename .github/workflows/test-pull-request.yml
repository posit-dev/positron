name: "Test: PR"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - "prerelease/**"
      - "release/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-tags:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.pr-tags.outputs.tags }}
      win_tag_found: ${{ steps.pr-tags.outputs.win_tag_found }}
      web_tag_found: ${{ steps.pr-tags.outputs.web_tag_found }}
      rhel_electron_tag_found: ${{ steps.pr-tags.outputs.rhel_electron_tag_found }}
      rhel_web_tag_found: ${{ steps.pr-tags.outputs.rhel_web_tag_found }}
      suse_electron_tag_found: ${{ steps.pr-tags.outputs.suse_electron_tag_found }}
      suse_web_tag_found: ${{ steps.pr-tags.outputs.suse_web_tag_found }}
      sles_electron_tag_found: ${{ steps.pr-tags.outputs.sles_electron_tag_found }}
      sles_web_tag_found: ${{ steps.pr-tags.outputs.sles_web_tag_found }}
      debian_electron_tag_found: ${{ steps.pr-tags.outputs.debian_electron_tag_found }}
      debian_web_tag_found: ${{ steps.pr-tags.outputs.debian_web_tag_found }}
      pyrefly_tag_found: ${{ steps.pr-tags.outputs.pyrefly_tag_found }}
      workbench_tag_found: ${{ steps.pr-tags.outputs.workbench_tag_found }}
      workbench_stable_tag_found: ${{ steps.pr-tags.outputs.workbench_stable_tag_found }}
      jupyter_tag_found: ${{ steps.pr-tags.outputs.jupyter_tag_found }}
      remote_ssh_tag_found: ${{ steps.pr-tags.outputs.remote_ssh_tag_found }}

    steps:
      - uses: actions/checkout@v7
      # Cheap pre-check so the Node setup + Playwright install below (needed
      # only for derive-test-change-tags.mjs's `playwright test --list` call)
      # run just for the PRs that actually touch e2e test files -- most PRs
      # don't, and there's nothing for that script to derive otherwise.
      - name: Check for e2e test file changes
        id: e2e-test-changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          CHANGED_FILES=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${GITHUB_EVENT_PULL_REQUEST_NUMBER}/files" --paginate \
            --header "Authorization: token ${GITHUB_TOKEN}" \
            --jq '.[].filename' || true)
          if echo "$CHANGED_FILES" | grep -qE '^test/e2e/tests/.*\.test\.ts$'; then
            echo "PR touches e2e test files. Running e2e test-change tag derivation setup."
            echo "has_e2e_test_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "PR does not touch e2e test files. Skipping e2e test-change tag derivation setup."
            echo "has_e2e_test_changes=false" >> "$GITHUB_OUTPUT"
          fi
      # Needed for derive-test-change-tags.mjs's `playwright test --list` call
      # below (Task 2). Pinned via .nvmrc rather than relying on whatever
      # ubuntu-latest ships with.
      - name: Set up Node
        if: steps.e2e-test-changes.outputs.has_e2e_test_changes == 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
      # Install just enough for `playwright test --list` to import every test
      # file and discover its tags. `--list` must import the whole test suite,
      # whose import graph reaches the full root + test/e2e dependency trees --
      # so both installs are required. `--ignore-scripts` is the key: it places
      # every (pure-JS) dependency without running the native build scripts
      # (kerberos, windows-foreground-love, etc.) that need system dev headers
      # this bare runner lacks and that listing doesn't need. No browser
      # binaries, no install-deps, no tsc compile.
      - name: Install e2e test deps for test listing
        if: steps.e2e-test-changes.outputs.has_e2e_test_changes == 'true'
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: |
          # `playwright test --list` eagerly loads the e2e infra, which computes
          # the Positron version via `git rev-list --count <anchor>..HEAD`. The
          # anchor is an old commit absent from the shallow actions/checkout, so
          # that command crashes and dumps a (caught, harmless) stack trace into
          # the log. Unshallow so the range resolves and the log stays clean.
          if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
            git fetch --unshallow --quiet || true
          fi
          npm ci --ignore-scripts --no-audit --no-fund
          npm --prefix test/e2e ci --ignore-scripts --no-audit --no-fund
          # One test file (plots.test.ts) eagerly imports resemblejs -> canvas,
          # a native addon left unbuilt by --ignore-scripts. Playwright aborts
          # the entire listing if any single file fails to import, so replace
          # each installed canvas package with a no-op stub: resemblejs only
          # references canvas's API at load time (never calls it during a
          # listing), so the stub satisfies the import cleanly. If a future
          # test file adds another eager native import, the derivation degrades
          # gracefully to source-map tags rather than failing the job.
          STUB='module.exports = { Image: class {}, Canvas: class {}, createCanvas: () => ({}), loadImage: async () => ({}), registerFont: () => {} };'
          find node_modules test/e2e/node_modules -type d -name canvas -path '*node_modules/canvas' 2>/dev/null | while IFS= read -r dir; do
            printf '%s\n' "$STUB" > "$dir/__stub_index.js"
            node -e "const fs=require('fs'); const f=process.argv[1]; const p=JSON.parse(fs.readFileSync(f)); p.main='__stub_index.js'; delete p.browser; delete p.exports; fs.writeFileSync(f, JSON.stringify(p));" "$dir/package.json"
            echo "Stubbed native canvas at $dir for test listing."
          done
      # Guardrail for the tag-derivation scripts; fail fast before relying on them below.
      - name: Unit test the tag-derivation helpers
        run: bash scripts/test/pr-tags-lib-test.sh
      - name: Validate test-tag-paths-map.json tags against test-tags.ts
        run: bash scripts/check-test-tag-map.sh --tags-only
      - name: Parse Tags from PR Body
        id: pr-tags
        run: bash scripts/pr-tags-parse.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
      # The advisory comment (no-match / unmapped-dir warnings) is posted from
      # the pr-e2e-comment workflow, folded into the single "E2E Tests" comment.

  e2e-ubuntu-electron:
    name: e2e
    uses: ./.github/workflows/test-e2e-ubuntu.yml
    needs: pr-tags
    with:
      grep: ${{ needs.pr-tags.outputs.tags }}
      display_name: "electron"
      install_undetectable_interpreters: false
      install_license: false
      upload_logs: false
      workers: 2
      allow_soft_fail: false
    secrets: inherit

  e2e-windows-electron:
    needs: pr-tags
    if: ${{ needs.pr-tags.outputs.win_tag_found == 'true' }}
    name: e2e
    uses: ./.github/workflows/test-e2e-windows-run.yml
    with:
      save_cache: true
      grep: ${{ needs.pr-tags.outputs.tags }}
      display_name: "electron-win"
      upload_logs: false
      allow_soft_fail: false
    secrets: inherit

  e2e-ubuntu-browser:
    needs: pr-tags
    if: ${{ needs.pr-tags.outputs.web_tag_found == 'true' }}
    name: e2e
    uses: ./.github/workflows/test-e2e-ubuntu.yml
    with:
      grep: ${{ needs.pr-tags.outputs.tags }}
      display_name: "chromium"
      project: "e2e-chromium"
      install_undetectable_interpreters: false
      install_license: true
      upload_logs: false
      allow_soft_fail: false
    secrets: inherit

  e2e-rhel-electron:
    name: e2e
    uses: ./.github/workflows/test-e2e-rhel.yml
    needs: pr-tags
    if: ${{ needs.pr-tags.outputs.rhel_electron_tag_found == 'true' }}
    with:
      grep: ${{ needs.pr-tags.outputs.tags }}
      display_name: "electron (RHEL)"
      install_undetectable_interpreters: false
      install_license: false
      upload_logs: false
      allow_soft_fail: false
    secrets: inherit

  e2e-rhel-chromium:
    needs: pr-tags
    if: ${{ needs.pr-tags.outputs.rhel_web_tag_found == 'true' }}
    name: e2e
    uses: ./.github/workflows/test-e2e-rhel.yml
    with:
      grep: ${{ needs.pr-tags.outputs.tags }}
      display_name: "chromium (RHEL)"
      project: "e2e-chromium"
      install_undetectable_interpreters: false
      install_license: true
      upload_logs: false
      allow_soft_fail: false
    secrets: inherit

  e2e-suse-electron:
    name: e2e
    uses: ./.github/workflows/test-e2e-suse.yml
    needs: pr-tags
    if: ${{ needs.pr-tags.outputs.suse_electron_tag_found == 'true' }}
    with:
      grep: ${{ needs.pr-tags.outputs.tags }}
      display_name: "electron (SUSE)"
      install_undetectable_interpreters: false
      install_license: false
      upload_logs: false
      allow_soft_fail: false
    secrets: inherit

  e2e-suse-chromium:
    needs: pr-tags
    if: ${{ needs.pr-tags.outputs.suse_web_tag_found == 'true' }}
    name: e2e
    uses: ./.github/workflows/test-e2e-suse.yml
    with:
      grep: ${{ needs.pr-tags.outputs.tags }}
      display_name: "chromium (SUSE)"
      project: "e2e-chromium"
      install_undetectable_interpreters: false
      install_license: true
      upload_logs: false
      allow_soft_fail: false
    secrets: inherit

  e2e-sles-electron:
    name: e2e
    uses: ./.github/workflows/test-e2e-sles.yml
    needs: pr-tags
    if: ${{ needs.pr-tags.outputs.sles_electron_tag_found == 'true' }}
    with:
      grep: ${{ needs.pr-tags.outputs.tags }}
      display_name: "electron (SLES)"
      install_undetectable_interpreters: false
      install_license: false
      upload_logs: false
      allow_soft_fail: false
    secrets: inherit

  e2e-sles-chromium:
    needs: pr-tags
    if: ${{ needs.pr-tags.outputs.sles_web_tag_found == 'true' }}
    name: e2e
    uses: ./.github/workflows/test-e2e-sles.yml
    with:
      grep: ${{ needs.pr-tags.outputs.tags }}
      display_name: "chromium (SLES)"
      project: "e2e-chromium"
      install_undetectable_interpreters: false
      install_license: true
      upload_logs: false
      allow_soft_fail: false
    secrets: inherit

  e2e-debian-electron:
    name: e2e
    uses: ./.github/workflows/test-e2e-debian.yml
    needs: pr-tags
    if: ${{ needs.pr-tags.outputs.debian_electron_tag_found == 'true' }}
    with:
      grep: ${{ needs.pr-tags.outputs.tags }}
      display_name: "electron (Debian)"
      install_undetectable_interpreters: false
      install_license: false
      upload_logs: false
      allow_soft_fail: false
    secrets: inherit

  e2e-debian-chromium:
    needs: pr-tags
    if: ${{ needs.pr-tags.outputs.debian_web_tag_found == 'true' }}
    name: e2e
    uses: ./.github/workflows/test-e2e-debian.yml
    with:
      grep: ${{ needs.pr-tags.outputs.tags }}
      display_name: "chromium (Debian)"
      project: "e2e-chromium"
      install_undetectable_interpreters: false
      install_license: true
      upload_logs: false
      allow_soft_fail: false
    secrets: inherit

  e2e-pyrefly:
    needs: pr-tags
    if: ${{ needs.pr-tags.outputs.pyrefly_tag_found == 'true' }}
    name: e2e
    uses: ./.github/workflows/test-e2e-pyrefly.yml
    secrets: inherit

  build-workbench:
    needs: pr-tags
    if: ${{ needs.pr-tags.outputs.workbench_tag_found == 'true' || needs.pr-tags.outputs.workbench_stable_tag_found == 'true' }}
    name: build
    uses: ./.github/workflows/build-workbench-linux.yml
    secrets: inherit

  e2e-workbench:
    needs: [pr-tags, build-workbench]
    if: ${{ needs.pr-tags.outputs.workbench_tag_found == 'true' }}
    name: e2e
    uses: ./.github/workflows/test-e2e-workbench-ubuntu.yml
    with:
      grep: ${{ needs.pr-tags.outputs.tags }}
      display_name: "workbench"
      install_license: false
      upload_logs: false
      allow_soft_fail: false
    secrets: inherit

  e2e-workbench-stable:
    needs: [pr-tags, build-workbench]
    if: ${{ needs.pr-tags.outputs.workbench_stable_tag_found == 'true' }}
    name: e2e
    uses: ./.github/workflows/test-e2e-workbench-ubuntu.yml
    with:
      grep: "@:workbench"
      display_name: "workbench-stable"
      install_license: false
      upload_logs: false
      allow_soft_fail: false
      install_mode: "ci-stable"
    secrets: inherit

  build-jupyter:
    needs: pr-tags
    if: ${{ needs.pr-tags.outputs.jupyter_tag_found == 'true' }}
    name: build
    uses: ./.github/workflows/build-jupyter-linux.yml
    secrets: inherit

  e2e-jupyter:
    needs: [pr-tags, build-jupyter]
    if: ${{ needs.pr-tags.outputs.jupyter_tag_found == 'true' }}
    name: e2e
    uses: ./.github/workflows/test-e2e-jupyter-ubuntu.yml
    with:
      grep: ${{ needs.pr-tags.outputs.tags }}
      display_name: "jupyter"
      install_license: true
      upload_logs: false
      allow_soft_fail: false
    secrets: inherit

  build-remote-ssh:
    needs: pr-tags
    if: ${{ needs.pr-tags.outputs.remote_ssh_tag_found == 'true' }}
    name: build
    uses: ./.github/workflows/build-remote-ssh-linux.yml
    secrets: inherit

  e2e-remote-ssh:
    needs: [pr-tags, build-remote-ssh]
    if: ${{ needs.pr-tags.outputs.remote_ssh_tag_found == 'true' }}
    name: e2e
    uses: ./.github/workflows/test-e2e-remote-ssh-ubuntu.yml
    with:
      grep: ${{ needs.pr-tags.outputs.tags }}
      display_name: "remote-ssh"
      upload_logs: false
      allow_soft_fail: false
    secrets: inherit

  unit-tests:
    name: test
    uses: ./.github/workflows/test-unit.yml
    secrets: inherit
    with:
      save_cache: false  # PRs restore from main only; test-merge.yml saves

  ext-host-tests:
    name: test
    uses: ./.github/workflows/test-ext-host.yml
    secrets: inherit
    with:
      pull_request: true
