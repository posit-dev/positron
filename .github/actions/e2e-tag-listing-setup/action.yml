name: 'E2E Tag Listing Setup'
description: >
  Install just enough for `playwright test --list` so derive-test-change-tags.mjs
  can discover e2e test tags. Gated: only installs for PRs that touch e2e test
  files. Shared by the pr-tags job (test-pull-request.yml) and the comment job
  (pr-e2e-comment.yml) so their derivation environments can't drift.

inputs:
  github-token:
    description: 'Token for the changed-files API check'
    required: true
  github-repository:
    description: 'owner/repo'
    required: true
  pull-request-number:
    description: 'PR number to inspect for changed files'
    required: true

outputs:
  has_e2e_test_changes:
    description: 'true when the PR touches e2e test files (test/e2e/tests/**/*.test.ts)'
    value: ${{ steps.e2e-test-changes.outputs.has_e2e_test_changes }}

runs:
  using: 'composite'
  steps:
    # Cheap pre-check so the Node setup + install below run only for the PRs
    # that actually touch e2e test files -- most PRs don't, and there's nothing
    # for derive-test-change-tags.mjs to derive otherwise.
    - name: Check for e2e test file changes
      id: e2e-test-changes
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        CHANGED_FILES=$(gh api "repos/${{ inputs.github-repository }}/pulls/${{ inputs.pull-request-number }}/files" --paginate \
          --jq '.[].filename' || true)
        if echo "$CHANGED_FILES" | grep -qE '^test/e2e/tests/.*\.test\.ts$'; then
          echo "PR touches e2e test files. Running e2e test-change tag derivation setup."
          echo "has_e2e_test_changes=true" >> "$GITHUB_OUTPUT"
        else
          echo "PR does not touch e2e test files. Skipping e2e test-change tag derivation setup."
          echo "has_e2e_test_changes=false" >> "$GITHUB_OUTPUT"
        fi

    # Pinned via .nvmrc rather than relying on whatever the runner ships with.
    - name: Set up Node
      if: steps.e2e-test-changes.outputs.has_e2e_test_changes == 'true'
      uses: actions/setup-node@v6
      with:
        node-version-file: ".nvmrc"

    # Install just enough for `playwright test --list` to import every test file
    # and discover its tags. `--list` must import the whole test suite, whose
    # import graph reaches the full root + test/e2e dependency trees -- so both
    # installs are required. `--ignore-scripts` is the key: it places every
    # (pure-JS) dependency without running the native build scripts (kerberos,
    # windows-foreground-love, etc.) that need system dev headers this bare
    # runner lacks and that listing doesn't need. No browser binaries, no
    # install-deps, no tsc compile.
    - name: Install e2e test deps for test listing
      if: steps.e2e-test-changes.outputs.has_e2e_test_changes == 'true'
      shell: bash
      env:
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      run: |
        # `playwright test --list` eagerly loads the e2e infra, which computes
        # the Positron version via `git rev-list --count <anchor>..HEAD`. The
        # anchor is an old commit absent from the shallow actions/checkout, so
        # that command crashes and dumps a (caught, harmless) stack trace into
        # the log. Unshallow so the range resolves and the log stays clean.
        if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
          git fetch --unshallow --quiet || true
        fi
        npm ci --ignore-scripts --no-audit --no-fund --prefer-offline
        npm --prefix test/e2e ci --ignore-scripts --no-audit --no-fund --prefer-offline
        # One test file (plots.test.ts) eagerly imports resemblejs -> canvas,
        # a native addon left unbuilt by --ignore-scripts. Playwright aborts
        # the entire listing if any single file fails to import, so replace
        # each installed canvas package with a no-op stub: resemblejs only
        # references canvas's API at load time (never calls it during a
        # listing), so the stub satisfies the import cleanly. If a future
        # test file adds another eager native import, the derivation degrades
        # gracefully to source-map tags rather than failing the job.
        STUB='module.exports = { Image: class {}, Canvas: class {}, createCanvas: () => ({}), loadImage: async () => ({}), registerFont: () => {} };'
        find node_modules test/e2e/node_modules -type d -name canvas -path '*node_modules/canvas' 2>/dev/null | while IFS= read -r dir; do
          printf '%s\n' "$STUB" > "$dir/__stub_index.js"
          node -e "const fs=require('fs'); const f=process.argv[1]; const p=JSON.parse(fs.readFileSync(f)); p.main='__stub_index.js'; delete p.browser; delete p.exports; fs.writeFileSync(f, JSON.stringify(p));" "$dir/package.json"
          echo "Stubbed native canvas at $dir for test listing."
        done
