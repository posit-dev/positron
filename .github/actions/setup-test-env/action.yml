name: "Setup E2E Test Environment"
description: "Install necessary dependencies for E2E testing"
inputs:
  aws-role-to-assume:
    description: "The AWS role to assume for S3 access"
    required: true
  aws-region:
    description: "The AWS region for S3"
    required: true

runs:
  using: "composite"
  steps:
    # NOTE: E2E dependencies are installed by setup-build-env action
    # This action only handles compilation and environment setup
    - name: Compile E2E Tests
      shell: bash
      run: npm --prefix test/e2e run compile

    - name: Setup AWS S3 Access
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ inputs.aws-role-to-assume }}
        aws-region: ${{ inputs.aws-region }}
        # Session must outlast the full build + sharded test run so the Bedrock
        # sign-in e2e test doesn't hit an expired STS token (must be <= role
        # MaxSessionDuration).
        role-duration-seconds: 21600

    - name: Setup Xvfb
      uses: ./.github/actions/setup-xvfb
