name: 'Setup Workbench Docker'
description: 'Start Docker Compose services and install Workbench in container'

inputs:
  install-mode:
    description: 'Installation mode: "ci" for latest daily build or "ci-stable" for stable release'
    required: false
    default: 'ci'
  credentials:
    description: 'Optional managed credential to provision: "snowflake", "databricks", or empty for none'
    required: false
    default: ''
  wb-password:
    description: 'Workbench password'
    required: true
  github-token:
    description: 'GitHub token for authentication'
    required: true
  run-id:
    description: 'GitHub run ID for Docker Compose project name'
    required: true
  custom-positron-tarball:
    description: 'Optional path to custom Positron workbench tar.gz to install instead of downloading'
    required: false
    default: ''
  workbench-license-path:
    description: 'Path to Workbench license file'
    required: false
    default: '/tmp/workbench.lic'
  connect-license-path:
    description: 'Path to Connect license file'
    required: false
    default: '/tmp/connect.lic'

runs:
  using: 'composite'
  steps:
    - name: Prepare Connect license for volume mount
      shell: bash
      run: |
        # Create connect directory if it doesn't exist
        mkdir -p docker/environments/pwb-local/connect
        # Copy Connect license to the location expected by docker-compose volume mount
        if [ -f "${{ inputs.connect-license-path }}" ]; then
          cp "${{ inputs.connect-license-path }}" docker/environments/pwb-local/connect/connect.lic
          echo "Connect license copied to docker/environments/pwb-local/connect/connect.lic"
        else
          echo "Warning: Connect license not found at ${{ inputs.connect-license-path }}"
        fi

    - name: Start Docker Compose Services
      shell: bash
      run: |
        docker compose \
          -p "${{ inputs.run-id }}" \
          -f docker/environments/pwb-local/docker-compose.workbench.yml \
          up -d

    - name: Setup workbench scripts
      shell: bash
      run: |
        # Scripts are checked out with the repo under docker/environments/wb-local
        SCRIPTS_DIR="docker/environments/wb-local"

        # Copy scripts into the container
        docker cp "$SCRIPTS_DIR/install-workbench.sh" test:/tmp/install-workbench.sh
        docker cp "$SCRIPTS_DIR/ensure-connect-token.sh" test:/tmp/ensure-connect-token.sh
        docker cp "$SCRIPTS_DIR/positronDownload.sh" test:/tmp/positronDownload.sh
        docker cp "$SCRIPTS_DIR/get-latest-wb-noble-url.sh" test:/tmp/get-latest-wb-noble-url.sh
        docker cp "$SCRIPTS_DIR/configure-datasources.sh" test:/tmp/configure-datasources.sh

        # Copy Workbench license into test container if it exists
        if [ -f "${{ inputs.workbench-license-path }}" ]; then
          docker cp "${{ inputs.workbench-license-path }}" test:/tmp/workbench.lic
        fi

        # Make scripts executable
        docker exec test chmod +x /tmp/install-workbench.sh
        docker exec test chmod +x /tmp/ensure-connect-token.sh
        docker exec test chmod +x /tmp/positronDownload.sh
        docker exec test chmod +x /tmp/get-latest-wb-noble-url.sh
        docker exec test chmod +x /tmp/configure-datasources.sh

    - name: Install Workbench in container
      shell: bash
      run: |
        CREDENTIALS_FLAG=""
        if [ -n "${{ inputs.credentials }}" ]; then
          CREDENTIALS_FLAG="--credentials=${{ inputs.credentials }}"
        fi
        docker exec \
          -e GITHUB_TOKEN="${{ inputs.github-token }}" \
          -e ARCH_SUFFIX=amd64 \
          -e WB_PASSWORD="${{ inputs.wb-password }}" \
          -e DATABRICKS_URL_="${DATABRICKS_URL}" \
          -e DATABRICKS_CLIENT_ID_="${DATABRICKS_CLIENT_ID}" \
          -e SNOWFLAKE_ACCOUNT_="${SNOWFLAKE_ACCOUNT}" \
          -e SNOWFLAKE_CLIENT_ID_="${SNOWFLAKE_CLIENT_ID}" \
          -e SNOWFLAKE_CLIENT_SECRET_="${SNOWFLAKE_CLIENT_SECRET}" \
          -e AZURE_SERVICE_PRINCIPAL_CLIENT_SECRET_="${AZURE_SERVICE_PRINCIPAL_CLIENT_SECRET}" \
          test /bin/bash -c "/tmp/install-workbench.sh --${{ inputs.install-mode }} $CREDENTIALS_FLAG"

    - name: Install custom Positron build (if provided)
      if: inputs.custom-positron-tarball != ''
      shell: bash
      run: |
        # Copy the custom workbench tar.gz into container
        docker cp "${{ inputs.custom-positron-tarball }}" test:/tmp/positron-custom.tar.gz

        # Extract and replace the Positron installation
        docker exec test /bin/bash -c "
          cd /tmp &&
          tar -xzf positron-custom.tar.gz &&
          # Remove the default Positron installation
          rm -rf /usr/lib/rstudio-server/bin/positron-server/new &&
          # Install our custom build
          cp -r vscode-reh-web-pwb-linux-x64 /usr/lib/rstudio-server/bin/positron-server/new &&
          chown -R rstudio-server:rstudio-server /usr/lib/rstudio-server/bin/positron-server/new &&
          # Restart so rserver re-scans installs and picks up our build
          sudo rstudio-server restart
        "
