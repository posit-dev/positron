name: "Setup Release Screenshot Runtimes"
description: >
  Bundles the macOS install dance shared by the release-screenshots
  workflows: Node + npm deps + Playwright + qa-example-content + Python
  (primary + alt) + R via rig (primary + alt) + Python and R packages
  needed by the qa-example-content workspaces. Outputs the resolved
  Python versions so the caller can set POSITRON_PY_*_VER_SEL.

inputs:
  python-primary-version:
    description: "Python version request for setup-python (primary). Latest patch resolved."
    required: false
    default: '3.10'
  python-alt-version:
    description: "Python version request for setup-python (alternate). Latest patch resolved."
    required: false
    default: '3.13'
  r-primary-version:
    description: "R version installed via rig as the primary."
    required: false
    default: '4.5.2'
  r-alt-version:
    description: "R version installed via rig as the alternate."
    required: false
    default: '4.4.2'

outputs:
  python-primary-version:
    description: "Resolved primary Python version (e.g. 3.10.18)."
    value: ${{ steps.setup-python-primary.outputs.python-version }}
  python-alt-version:
    description: "Resolved alternate Python version (e.g. 3.13.13)."
    value: ${{ steps.setup-python-alt.outputs.python-version }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc

    - name: Install npm dependencies
      shell: bash
      env:
        ELECTRON_SKIP_BINARY_DOWNLOAD: 1
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      run: npm ci --ignore-scripts

    - name: Install test/e2e dependencies
      shell: bash
      run: npm --prefix test/e2e ci --prefer-offline --no-audit --no-fund

    - name: Install Playwright Chromium
      shell: bash
      run: npx playwright install chromium

    - name: Clone qa-example-content
      shell: bash
      run: |
        git clone --depth 1 https://github.com/posit-dev/qa-example-content.git \
          test/e2e/qa-example-content

    - name: Setup Python (primary)
      id: setup-python-primary
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-primary-version }}
        cache: 'pip'
        cache-dependency-path: test/e2e/qa-example-content/requirements.txt

    - name: Install Python dependencies (primary)
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r test/e2e/qa-example-content/requirements.txt
        pip install ipykernel

    - name: Setup Python (alternate)
      id: setup-python-alt
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-alt-version }}

    - name: Install ipykernel for alternate Python
      shell: bash
      run: |
        python --version
        pip install ipykernel

    - name: Install rig
      shell: bash
      run: |
        brew tap r-lib/rig
        brew install --cask rig

    - name: Install R (primary)
      shell: bash
      run: |
        rig add ${{ inputs.r-primary-version }}
        R --version

    - name: Install R packages
      shell: bash
      working-directory: test/e2e/qa-example-content
      run: |
        Rscript -e "if (!requireNamespace('pak', quietly = TRUE)) install.packages('pak', repos = 'https://cran.rstudio.com')"
        Rscript -e "options(pak.install_binary = TRUE); pak::local_install_dev_deps(ask = FALSE, upgrade = FALSE)"

    - name: Install R (alternate)
      shell: bash
      run: rig add ${{ inputs.r-alt-version }}
