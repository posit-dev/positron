name: "Setup Release Screenshot Runtimes"
description: >
  Bundles the macOS install dance shared by the release-screenshots
  workflows: Node + npm deps + Playwright + qa-example-content + Python
  (primary + alt) + R via rig (primary + alt) + Python and R packages
  needed by the qa-example-content workspaces. Outputs the resolved
  Python versions so the caller can set POSITRON_PY_*_VER_SEL.

inputs:
  python-primary-version:
    description: "Python version request for setup-python (primary). Latest patch resolved."
    required: false
    default: '3.10'
  python-alt-version:
    description: "Python version request for setup-python (alternate). Latest patch resolved."
    required: false
    default: '3.13'
  r-primary-version:
    description: "R version installed via rig as the primary."
    required: false
    default: '4.5.2'
  r-alt-version:
    description: "R version installed via rig as the alternate."
    required: false
    default: '4.4.2'

outputs:
  python-primary-version:
    description: "Resolved primary Python version (e.g. 3.10.18)."
    value: ${{ steps.setup-python-primary.outputs.python-version }}
  python-alt-version:
    description: "Resolved alternate Python version (e.g. 3.13.13)."
    value: ${{ steps.setup-python-alt.outputs.python-version }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc

    - name: Install npm dependencies
      shell: bash
      env:
        ELECTRON_SKIP_BINARY_DOWNLOAD: 1
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      run: npm ci --ignore-scripts

    - name: Install test/e2e dependencies
      shell: bash
      run: npm --prefix test/e2e ci --prefer-offline --no-audit --no-fund

    - name: Install Playwright Chromium
      shell: bash
      run: npx playwright install chromium

    - name: Clone qa-example-content
      shell: bash
      run: |
        git clone --depth 1 https://github.com/posit-dev/qa-example-content.git \
          test/e2e/qa-example-content

    - name: Install uv + Python (primary)
      id: setup-python-primary
      uses: astral-sh/setup-uv@v7
      with:
        python-version: ${{ inputs.python-primary-version }}
        enable-cache: true
        cache-dependency-glob: test/e2e/qa-example-content/requirements.txt

    - name: Create primary venv at $RUNNER_TEMP/.venv (plain python -m venv)
      shell: bash
      run: |
        # Use python's stdlib venv (not `uv venv`) so the venv has no uv
        # marker files. Positron labels uv-managed envs "(uv: <parent dir>)"
        # which surfaced "_temp" / "positron" in screenshots; a plain venv
        # is labeled by its basename, ".venv".
        PYTHON=$(uv python find ${{ inputs.python-primary-version }})
        VENV_DIR="$RUNNER_TEMP/.venv"
        "$PYTHON" -m venv "$VENV_DIR"
        echo "VIRTUAL_ENV=$VENV_DIR" >> "$GITHUB_ENV"
        echo "$VENV_DIR/bin" >> "$GITHUB_PATH"

    - name: Install Python dependencies (primary)
      shell: bash
      run: |
        uv pip install -r test/e2e/qa-example-content/requirements.txt
        uv pip install ipykernel
        # Extra packages for screenshot tests not yet in qa-example-content's
        # requirements.
        uv pip install astropy matplotlib

    - name: Install Python (alternate, no venv activation)
      id: setup-python-alt
      shell: bash
      run: |
        uv python install ${{ inputs.python-alt-version }}
        ALT_PYTHON=$(uv python find ${{ inputs.python-alt-version }})
        ALT_VERSION=$("$ALT_PYTHON" --version | awk '{print $2}')
        echo "python-version=$ALT_VERSION" >> "$GITHUB_OUTPUT"
        # Install ipykernel into the alt Python so it's discoverable by Positron.
        # uv-managed Pythons are PEP 668 externally-managed, so pip install
        # needs --break-system-packages to write into site-packages.
        "$ALT_PYTHON" -m pip install --break-system-packages ipykernel

    - name: Install rig
      shell: bash
      run: |
        brew tap r-lib/rig
        brew install --cask rig

    - name: Install R (primary)
      shell: bash
      run: |
        rig add ${{ inputs.r-primary-version }}
        R --version

    - name: Install R packages
      shell: bash
      working-directory: test/e2e/qa-example-content
      run: |
        Rscript -e "if (!requireNamespace('pak', quietly = TRUE)) install.packages('pak', repos = 'https://cran.rstudio.com')"
        Rscript -e "options(pak.install_binary = TRUE); pak::local_install_dev_deps(ask = FALSE, upgrade = FALSE)"

    - name: Install R (alternate)
      shell: bash
      run: rig add ${{ inputs.r-alt-version }}
