version: '3.8'

services:
  jupyter-test:
    image: ghcr.io/posit-dev/positron-ubuntu24-amd64:141
    container_name: jupyter-test
    ports:
      - "8888:80"    # JupyterHub (TLJH uses port 80 internally)
      - "8080:8080"  # Positron server
      - "5900:5900"
    command: /lib/systemd/systemd
    tty: true
    stdin_open: true
    privileged: true
    cgroup: host
    networks:
      - mynetwork
    environment:
      - POSIT_WORKBENCH_PASSWORD=${POSIT_WORKBENCH_PASSWORD:-testpassword}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - container=docker
    volumes:
      - jupyter-data:/home
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /tmp
      - /run
      - /run/lock
    ulimits:
      nproc: 4096
      nofile:
        soft: 65536
        hard: 65536

networks:
  mynetwork:
    driver: bridge

volumes:
  jupyter-data:
