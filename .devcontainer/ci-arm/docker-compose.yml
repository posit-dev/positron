services:
  test:
    image: ghcr.io/posit-dev/positron-ubuntu24-${POSITRON_CI_IMAGE_ARCH:-arm64}:${POSITRON_CI_IMAGE_TAG:-127}
    init: true
    privileged: true
    command: /bin/sh -c "while sleep 1000; do :; done"
    env_file:
      - .env
    environment:
      - E2E_POSTGRES_USER=${E2E_POSTGRES_USER:-testuser}
      - E2E_POSTGRES_PASSWORD=${E2E_POSTGRES_PASSWORD:-testpassword}
      - POSITRON_DEV_LICENSE=${POSITRON_DEV_LICENSE}
      - POSITRON_CI_IMAGE_ARCH=${POSITRON_CI_IMAGE_ARCH:-arm64}
    # Workspace = bind mount of the host positron checkout (so "Reopen in Container" finds
    # .devcontainer/), with named-volume overlays on the heavy, platform-specific dirs so they
    # build at native Linux speed (see SPIKE-FINDINGS.md). The compose file is two levels under
    # the repo root, so ".." resolves to that root.
    volumes:
      - ../..:/workspaces/positron:cached
      - positron-node-modules:/workspaces/positron/node_modules
      - positron-e2e-node-modules:/workspaces/positron/test/e2e/node_modules
      - positron-build:/workspaces/positron/.build
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ci-arm-net

  postgres:
    image: ghcr.io/posit-dev/positron-postgres-${POSITRON_CI_IMAGE_ARCH:-arm64}:143
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${E2E_POSTGRES_USER:-testuser}
      - POSTGRES_PASSWORD=${E2E_POSTGRES_PASSWORD:-testpassword}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${E2E_POSTGRES_USER:-testuser} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - ci-arm-net

networks:
  ci-arm-net:
    driver: bridge

volumes:
  positron-node-modules:
  positron-e2e-node-modules:
  positron-build:
  postgres-data:
