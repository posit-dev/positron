<svg width="400" height="220" viewBox="0 0 400 220" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- Background -->
<rect width="400" height="220" fill="white"/>
<!-- Notebook toolbar frame -->
<rect x="20" y="20" width="360" height="30" rx="4" fill="#F4F4F4" stroke="#C0C0C0" stroke-width="1.5"/>
<!-- Toolbar buttons (left side) -->
<rect x="30" y="28" width="22" height="14" rx="3" fill="#C0C0C0"/>
<rect x="58" y="28" width="22" height="14" rx="3" fill="#C0C0C0"/>
<rect x="86" y="28" width="22" height="14" rx="3" fill="#C0C0C0"/>
<!-- Kernel selector button (right side, highlighted) -->
<rect x="260" y="26" width="110" height="18" rx="4" fill="#447099"/>
<!-- Python icon placeholder in selector -->
<circle cx="273" cy="35" r="5" fill="white" fill-opacity="0.4"/>
<!-- Selector text -->
<rect x="282" y="32" width="50" height="5" rx="2" fill="white" fill-opacity="0.9"/>
<!-- Dropdown chevron -->
<path d="M355 32 L359 37 L363 32" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
<!-- Dropdown menu -->
<rect x="240" y="52" width="150" height="148" rx="5" fill="white" stroke="#C0C0C0" stroke-width="1.5"/>
<!-- Shadow hint -->
<rect x="243" y="55" width="150" height="148" rx="5" fill="#00000008"/>
<!-- Menu section: Session header -->
<rect x="252" y="62" width="55" height="5" rx="2" fill="#3E4246"/>
<!-- Menu item 1: Python 3.12 (selected, with checkmark) -->
<rect x="248" y="74" width="134" height="22" rx="3" fill="#EDF4F9"/>
<path d="M254 85 L258 89 L264 81" stroke="#447099" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
<!-- Python icon -->
<circle cx="274" cy="85" r="4" fill="#447099"/>
<rect x="282" y="82" width="70" height="5" rx="2" fill="#447099"/>
<!-- Menu item 2: R 4.4 -->
<rect x="248" y="100" width="134" height="22" rx="3" fill="white"/>
<!-- R icon -->
<circle cx="274" cy="111" r="4" fill="#C0C0C0"/>
<rect x="282" y="108" width="50" height="5" rx="2" fill="#7C7C7C"/>
<!-- Divider -->
<line x1="252" y1="128" x2="382" y2="128" stroke="#E0E0E0" stroke-width="1"/>
<!-- Menu item 3: Restart Session -->
<rect x="248" y="134" width="134" height="22" rx="3" fill="white"/>
<!-- Restart icon (circular arrow) -->
<path d="M270 142 A4 4 0 1 1 270 148" stroke="#7C7C7C" stroke-width="1.5" fill="none" stroke-linecap="round"/>
<path d="M270 141 L270 144 L267 142" fill="#7C7C7C"/>
<rect x="282" y="142" width="65" height="5" rx="2" fill="#7C7C7C"/>
<!-- Menu item 4: Shut Down -->
<rect x="248" y="160" width="134" height="22" rx="3" fill="white"/>
<!-- Stop icon (square) -->
<rect x="268" y="168" width="8" height="8" rx="1" fill="#C0C0C0"/>
<rect x="282" y="169" width="55" height="5" rx="2" fill="#7C7C7C"/>
</svg>
